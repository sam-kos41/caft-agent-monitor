<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>agentdiag - Dashboard</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-base: #0f172a;
  --bg-panel: #1e293b;
  --bg-surface: #273549;
  --border: #334155;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;

  /* Phase colors */
  --phase-idle: #475569;
  --phase-gathering: #22d3ee;
  --phase-planning: #facc15;
  --phase-executing: #4ade80;
  --phase-verifying: #c084fc;
  --phase-delivering: #60a5fa;

  /* Severity */
  --severity-info: #3b82f6;
  --severity-warning: #f59e0b;
  --severity-critical: #ef4444;

  /* Health */
  --health-healthy: #4ade80;
  --health-degraded: #f59e0b;
  --health-failing: #ef4444;

  /* Layout */
  --left-col: 280px;
  --right-col: 320px;
  --header-h: 48px;
}

html, body {
  height: 100%;
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  font-size: 14px;
  line-height: 1.5;
}

/* ===== App Shell ===== */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#top-bar {
  height: var(--header-h);
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 16px;
  flex-shrink: 0;
}

#top-bar .logo {
  font-weight: 700;
  font-size: 15px;
  letter-spacing: -0.3px;
  color: var(--text-primary);
}

#top-bar .logo span {
  color: var(--phase-gathering);
}

#connection-status {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-muted);
}

#connection-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: background 0.3s;
}

#connection-dot.connected { background: var(--health-healthy); }
#connection-dot.disconnected { background: var(--health-failing); }
#connection-dot.waiting {
  background: var(--health-degraded);
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

#session-indicator {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 8px;
}
.session-project {
  color: var(--text-secondary);
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.session-id {
  font-family: monospace;
  color: var(--text-muted);
  font-size: 11px;
  opacity: 0.7;
}

/* ===== Main Layout ===== */
#main {
  display: grid;
  grid-template-columns: var(--left-col) 1fr var(--right-col);
  flex: 1;
  min-height: 0;
}

/* ===== Left Column: Session Health ===== */
#left-col {
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.panel-section {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.panel-section:last-child { border-bottom: none; }

.section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 12px;
}

/* Health Status */
.health-badge-el {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  text-transform: capitalize;
}

.health-badge-el.healthy { background: rgba(74,222,128,0.15); color: var(--health-healthy); }
.health-badge-el.degraded { background: rgba(245,158,11,0.15); color: var(--health-degraded); }
.health-badge-el.failing { background: rgba(239,68,68,0.15); color: var(--health-failing); }

.health-badge-el .health-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.health-badge-el.healthy .health-dot { background: var(--health-healthy); }
.health-badge-el.degraded .health-dot { background: var(--health-degraded); }
.health-badge-el.failing .health-dot { background: var(--health-failing); }

/* Phase indicator */
.current-phase-text {
  font-size: 18px;
  font-weight: 700;
  text-transform: capitalize;
  margin-bottom: 4px;
}

.phase-progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 8px;
}

.phase-progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.4s ease, background 0.3s;
}

/* Completion */
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
}

.stat-label {
  font-size: 12px;
  color: var(--text-secondary);
}

.stat-value {
  font-size: 13px;
  font-weight: 600;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

/* Completion bar */
.completion-bar-container {
  margin-top: 8px;
}

.completion-bar-bg {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.completion-bar-fill-el {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s ease;
}

/* Sparkline */
.sparkline-container {
  margin-top: 8px;
  height: 32px;
}

.sparkline-canvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* Phase balance */
.phase-balance {
  display: flex;
  height: 8px;
  border-radius: 4px;
  overflow: hidden;
  gap: 1px;
  margin-top: 8px;
}

.phase-bar-segment {
  height: 100%;
  min-width: 2px;
  transition: flex 0.4s ease;
}

.phase-breakdown {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 12px;
  margin-top: 8px;
}

.phase-breakdown-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-secondary);
}

.phase-breakdown-dot {
  width: 6px;
  height: 6px;
  border-radius: 2px;
  flex-shrink: 0;
}

.phase-breakdown-count {
  margin-left: auto;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-weight: 600;
  color: var(--text-primary);
}

/* Agent list */
.agent-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
}

.agent-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.agent-label {
  font-size: 12px;
  font-weight: 600;
}

.agent-phase {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: capitalize;
  margin-left: auto;
}

/* Decision trace profile */
.profile-item {
  display: flex;
  justify-content: space-between;
  padding: 3px 0;
  font-size: 12px;
}

.profile-key {
  color: var(--text-secondary);
}

.profile-val {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-weight: 600;
}

/* ===== Center Column ===== */
#center-col {
  display: flex;
  flex-direction: column;
  min-width: 0;
  min-height: 0;
}

/* Tab bar */
.tab-bar {
  display: flex;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.tab-btn {
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}

.tab-btn:hover { color: var(--text-secondary); }
.tab-btn.active {
  color: var(--text-primary);
  border-bottom-color: var(--phase-gathering);
}

.tab-count {
  margin-left: 6px;
  font-size: 11px;
  background: var(--border);
  padding: 1px 6px;
  border-radius: 8px;
  color: var(--text-secondary);
}

/* Tab content panels */
.tab-panel {
  display: none;
  flex: 1;
  min-height: 0;
  overflow: auto;
}

.tab-panel.active { display: flex; flex-direction: column; }

/* ===== Timeline View ===== */
.timeline-panel {
  padding: 16px;
}

.timeline-scroll {
  display: flex;
  gap: 2px;
  overflow-x: auto;
  padding-bottom: 12px;
  min-height: 80px;
  align-items: flex-end;
}

.timeline-scroll::-webkit-scrollbar {
  height: 6px;
}

.timeline-scroll::-webkit-scrollbar-track {
  background: var(--bg-base);
  border-radius: 3px;
}

.timeline-scroll::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

.behavior-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 40px;
  max-width: 120px;
  flex-shrink: 0;
  cursor: pointer;
  transition: transform 0.15s;
  position: relative;
}

.behavior-block:hover { transform: translateY(-2px); }

.behavior-block.selected {
  transform: translateY(-3px);
}

.block-bar {
  width: 100%;
  min-height: 24px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2px 6px;
  font-size: 10px;
  font-weight: 600;
  color: rgba(0,0,0,0.7);
  position: relative;
}

.block-bar.has-failures {
  box-shadow: inset 0 -3px 0 rgba(239,68,68,0.6);
}

.block-label {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  text-align: center;
}

.block-step-range {
  font-size: 9px;
  color: var(--text-muted);
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

/* Transition divider */
.phase-transition-divider {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  min-width: 20px;
  flex-shrink: 0;
  position: relative;
  padding: 0 2px;
}

.transition-line {
  width: 1px;
  height: 40px;
  background: var(--border);
}

.transition-line.regression {
  background: var(--severity-critical);
  width: 2px;
}

.transition-arrow {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 2px;
}

.transition-arrow.regression {
  color: var(--severity-critical);
}

/* Timeline empty state */
.timeline-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 80px;
  color: var(--text-muted);
  font-size: 13px;
}

/* ===== Diagnosis Panel ===== */
.diagnoses-panel {
  padding: 16px;
  gap: 12px;
}

.diagnosis-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 12px;
  transition: border-color 0.2s;
}

.diagnosis-card:hover { border-color: var(--text-muted); }

.diagnosis-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.severity-badge {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.severity-badge.info { background: rgba(59,130,246,0.2); color: var(--severity-info); }
.severity-badge.warning { background: rgba(245,158,11,0.2); color: var(--severity-warning); }
.severity-badge.critical { background: rgba(239,68,68,0.2); color: var(--severity-critical); }

.diagnosis-caft-code {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 11px;
  color: var(--text-muted);
}

.diagnosis-step-link {
  margin-left: auto;
  font-size: 11px;
  color: var(--phase-gathering);
  cursor: pointer;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

.diagnosis-step-link:hover { text-decoration: underline; }

.diagnosis-message {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 8px;
  line-height: 1.6;
}

.diagnosis-remediation {
  font-size: 12px;
  color: var(--health-degraded);
  padding: 8px 10px;
  background: rgba(245,158,11,0.08);
  border-radius: 4px;
  margin-bottom: 8px;
  border-left: 3px solid var(--health-degraded);
}

.evidence-toggle {
  font-size: 11px;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  padding: 4px 0;
}

.evidence-toggle:hover { color: var(--text-secondary); }

.evidence-table {
  margin-top: 8px;
  width: 100%;
  border-collapse: collapse;
}

.evidence-table td {
  padding: 4px 8px;
  font-size: 12px;
  border-bottom: 1px solid var(--border);
}

.evidence-table td:first-child {
  color: var(--text-muted);
  font-weight: 500;
  width: 40%;
}

.evidence-table td:last-child {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  color: var(--text-primary);
  word-break: break-all;
}

.confidence-bar-container-diag {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.confidence-bar-bg {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.confidence-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s;
}

.confidence-label {
  font-size: 11px;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  color: var(--text-muted);
  min-width: 36px;
  text-align: right;
}

.diagnoses-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: 13px;
  text-align: center;
}

.diagnoses-empty .healthy-icon {
  font-size: 24px;
  margin-bottom: 8px;
  display: block;
}

/* ===== Decision Trace ===== */
.decision-trace-panel {
  padding: 16px;
}

.decision-trace-panel .trace-unavailable {
  color: var(--text-muted);
  font-size: 13px;
  text-align: center;
  padding: 40px 20px;
}

.heatmap-container {
  overflow: auto;
}

.heatmap-table {
  border-collapse: collapse;
  font-size: 11px;
  min-width: 100%;
}

.heatmap-table th {
  position: sticky;
  top: 0;
  background: var(--bg-panel);
  padding: 6px 8px;
  text-align: center;
  font-weight: 600;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.heatmap-table td {
  padding: 4px 8px;
  text-align: center;
  border-bottom: 1px solid rgba(51,65,85,0.3);
  position: relative;
}

.heatmap-table td:first-child {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  color: var(--text-muted);
  text-align: right;
  position: sticky;
  left: 0;
  background: var(--bg-panel);
}

.heatmap-cell {
  width: 16px;
  height: 16px;
  border-radius: 3px;
  display: inline-block;
  cursor: default;
  position: relative;
}

.heatmap-cell.fired { background: var(--health-healthy); }
.heatmap-cell.gate-failed { background: var(--border); }
.heatmap-cell.not-checked { background: transparent; }

/* Tooltip */
.heatmap-tooltip {
  display: none;
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-base);
  border: 1px solid var(--border);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 10px;
  color: var(--text-secondary);
  white-space: nowrap;
  z-index: 100;
  pointer-events: none;
}

.heatmap-cell:hover .heatmap-tooltip { display: block; }

/* ===== Right Column: LLM Decisions ===== */
#right-col {
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.llm-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.llm-header .section-title { margin-bottom: 12px; }

.llm-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.llm-stat {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
}

.llm-stat-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}

.llm-stat-dot.total { background: var(--text-muted); }
.llm-stat-dot.autoconfirmed { background: var(--health-healthy); opacity: 0.6; }
.llm-stat-dot.confirmed { background: var(--health-healthy); }
.llm-stat-dot.rejected { background: var(--health-failing); }
.llm-stat-dot.uncertain { background: var(--health-degraded); }

.llm-stat-label { color: var(--text-secondary); }

.llm-stat-value {
  margin-left: auto;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-weight: 600;
}

.llm-log {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
}

.llm-snapshot-item {
  padding: 8px 10px;
  margin-bottom: 6px;
  background: var(--bg-surface);
  border-radius: 6px;
  border: 1px solid var(--border);
  font-size: 12px;
}

.llm-snapshot-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}

.detector-name-link {
  font-weight: 600;
  color: var(--phase-gathering);
  cursor: pointer;
}

.detector-name-link:hover { text-decoration: underline; }

.snapshot-confidence {
  margin-left: auto;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 11px;
  color: var(--text-muted);
}

.snapshot-decision {
  font-size: 11px;
  color: var(--text-muted);
}

.snapshot-fired-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 3px;
  text-transform: uppercase;
}

.snapshot-fired-badge.fired {
  background: rgba(74,222,128,0.15);
  color: var(--health-healthy);
}

.snapshot-fired-badge.not-fired {
  background: rgba(100,116,139,0.15);
  color: var(--text-muted);
}

/* Detector detail modal */
.detector-detail-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,0.8);
  z-index: 200;
  justify-content: center;
  align-items: center;
}

.detector-detail-overlay.visible {
  display: flex;
}

.detector-detail-modal {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 600px;
  max-width: 90vw;
  max-height: 80vh;
  overflow-y: auto;
  padding: 20px;
}

.detector-detail-modal h3 {
  font-size: 16px;
  margin-bottom: 12px;
}

.modal-close {
  float: right;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 18px;
  cursor: pointer;
  padding: 4px;
}

.modal-close:hover { color: var(--text-primary); }

.detector-detail-content {
  font-size: 13px;
}

.detector-timeline-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(51,65,85,0.3);
  font-size: 12px;
}

.detector-timeline-step {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  color: var(--text-muted);
  min-width: 48px;
}

.detector-timeline-conf {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  min-width: 48px;
  text-align: right;
}

.detector-timeline-gate {
  color: var(--text-muted);
  font-size: 11px;
}

.llm-log-empty {
  color: var(--text-muted);
  font-size: 12px;
  text-align: center;
  padding: 20px;
}

/* ===== Waiting / End States ===== */
.waiting-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(15,23,42,0.85);
  z-index: 50;
}

.waiting-overlay.hidden { display: none; }

.waiting-pulse {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--phase-gathering);
  animation: pulse 1.5s ease-in-out infinite;
  margin-bottom: 12px;
}

.waiting-text {
  font-size: 14px;
  color: var(--text-secondary);
}

.session-complete-banner {
  display: none;
  background: rgba(96,165,250,0.1);
  border: 1px solid rgba(96,165,250,0.3);
  color: var(--phase-delivering);
  padding: 8px 16px;
  text-align: center;
  font-size: 13px;
  font-weight: 500;
}

.session-complete-banner.visible { display: block; }

/* Session context panel */
.session-context-section { border-bottom: 1px solid var(--border); }
.session-goal {
  font-size: 13px;
  color: var(--text-primary);
  line-height: 1.4;
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.session-meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 4px;
}
.session-meta-tag {
  font-size: 10px;
  color: var(--text-muted);
  background: var(--bg-surface);
  padding: 2px 6px;
  border-radius: 3px;
  white-space: nowrap;
}
.session-duration {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ===== Responsive ===== */
@media (max-width: 1280px) {
  #main {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr auto;
  }
  #left-col {
    border-right: none;
    border-bottom: 1px solid var(--border);
    flex-direction: row;
    overflow-x: auto;
    max-height: 200px;
  }
  #left-col .panel-section {
    min-width: 240px;
    border-bottom: none;
    border-right: 1px solid var(--border);
  }
  #right-col {
    border-left: none;
    border-top: 1px solid var(--border);
    max-height: 300px;
  }
}

/* Scrollbar for panels */
#left-col::-webkit-scrollbar,
.llm-log::-webkit-scrollbar,
.tab-panel::-webkit-scrollbar {
  width: 5px;
}

#left-col::-webkit-scrollbar-track,
.llm-log::-webkit-scrollbar-track,
.tab-panel::-webkit-scrollbar-track {
  background: transparent;
}

#left-col::-webkit-scrollbar-thumb,
.llm-log::-webkit-scrollbar-thumb,
.tab-panel::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

/* ===== Cognitive Load Monitor ===== */

.cognitive-overall {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.cognitive-overall-label {
  font-size: 12px;
  color: var(--text-secondary);
  min-width: 60px;
}

.cognitive-overall-bar {
  flex: 1;
  min-width: 120px;
  height: 8px;
  background: var(--bg-surface);
  border-radius: 4px;
  overflow: hidden;
}

.cognitive-overall-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease, background 0.3s;
}

.cognitive-overall-pct {
  font-size: 12px;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-weight: 600;
  min-width: 36px;
  text-align: right;
}

.cognitive-bottleneck {
  font-size: 12px;
  font-weight: 600;
}

/* Pipeline */
.cognitive-pipeline {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 4px;
  padding: 24px 16px 16px;
  min-height: 200px;
}

.cognitive-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  transition: transform 0.15s;
  flex: 1;
  max-width: 100px;
}

.cognitive-stage:hover { transform: translateY(-2px); }

.stage-bar {
  width: 48px;
  border-radius: 4px 4px 0 0;
  transition: height 0.5s ease, background 0.3s;
  min-height: 8px;
}

.cognitive-stage.bottleneck .stage-bar {
  box-shadow: 0 0 12px var(--severity-warning);
  animation: bottleneck-pulse 2s ease-in-out infinite;
}

@keyframes bottleneck-pulse {
  0%, 100% { box-shadow: 0 0 8px var(--severity-warning); }
  50%      { box-shadow: 0 0 20px var(--severity-warning); }
}

.stage-label {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 6px;
  text-align: center;
  white-space: nowrap;
}

.stage-load-pct {
  font-size: 10px;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}

.stage-status-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-top: 2px;
}

.stage-flow-arrow {
  color: var(--text-muted);
  font-size: 16px;
  align-self: center;
  margin-bottom: 32px;
  flex-shrink: 0;
}

.stage-flow-arrow.bottleneck-target {
  color: var(--severity-warning);
}

/* Stage detail panel */
.stage-detail-panel {
  margin: 0 16px 16px;
  padding: 14px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  animation: fadeSlideIn 0.2s ease;
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.stage-detail-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.stage-detail-status {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 3px;
  text-transform: uppercase;
  font-weight: 600;
}

.stage-detail-metrics {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}

.stage-metric-card {
  background: var(--bg-panel);
  border-radius: 6px;
  padding: 8px 10px;
  text-align: center;
}

.stage-metric-value {
  font-size: 16px;
  font-weight: 700;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

.stage-metric-label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

/* Memory items */
.memory-items-section {
  margin-top: 12px;
  border-top: 1px solid var(--border);
  padding-top: 10px;
}

.memory-items-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.memory-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  font-size: 12px;
}

.memory-item-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.memory-item-name {
  flex: 1;
  color: var(--text-primary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.memory-item-meta {
  color: var(--text-muted);
  font-size: 11px;
  white-space: nowrap;
}

.memory-item-retention-bar {
  width: 40px;
  height: 4px;
  background: var(--bg-panel);
  border-radius: 2px;
  overflow: hidden;
  flex-shrink: 0;
}

.memory-item-retention-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s;
}

/* Decision points */
.decisions-list {
  margin-top: 12px;
  border-top: 1px solid var(--border);
  padding-top: 10px;
}

.decision-item {
  padding: 6px 0;
  border-bottom: 1px solid rgba(51,65,85,0.3);
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.decision-item:last-child { border-bottom: none; }

.decision-step {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  color: var(--text-muted);
  font-size: 11px;
  min-width: 48px;
}

.decision-tool {
  font-weight: 600;
  color: var(--text-primary);
}

.decision-success {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
}

.decision-success.yes { background: rgba(74,222,128,0.15); color: var(--health-healthy); }
.decision-success.no { background: rgba(239,68,68,0.15); color: var(--health-failing); }

.decision-delib {
  color: var(--text-muted);
  font-size: 11px;
  margin-left: auto;
}

/* Decision quality metrics */
.decision-quality-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-top: 8px;
}

.decision-quality-item {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  padding: 2px 0;
}

.decision-quality-item .label { color: var(--text-secondary); }
.decision-quality-item .value {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-weight: 600;
}

/* IP Stage tag on DiagnosisCard */
.ip-stage-tag {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
  color: var(--bg-base);
  letter-spacing: 0.3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.15s;
}

.ip-stage-tag:hover { opacity: 0.8; }

/* Cognitive Load Summary (left column) */
.cognitive-summary-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 4px;
}

.cognitive-summary-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}

.cognitive-summary-bottleneck {
  font-size: 11px;
  margin-bottom: 8px;
}

.cognitive-summary-grid {
  display: grid;
  grid-template-columns: 14px 1fr 14px 1fr;
  gap: 3px 6px;
  align-items: center;
}

.cognitive-summary-letter {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  text-align: center;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

.cognitive-summary-minibar {
  height: 4px;
  border-radius: 2px;
  transition: width 0.5s ease;
}

/* Unavailable state */
.cognitive-unavailable {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 8px;
  height: 250px;
  color: var(--text-muted);
  font-size: 13px;
  text-align: center;
  padding: 24px;
}

.cognitive-unavailable code {
  font-size: 12px;
  background: var(--bg-surface);
  padding: 4px 8px;
  border-radius: 4px;
  color: var(--text-secondary);
}

/* Loading state for lazy-fetched detail */
.stage-detail-loading {
  color: var(--text-muted);
  font-size: 12px;
  text-align: center;
  padding: 16px;
}

/* ===== Wickens IP Pipeline Strip (always-visible, center top) ===== */

.wickens-strip {
  padding: 12px 16px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
  flex-shrink: 0;
}

/* Attention resources overlay bar */
.wickens-attention {
  display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
}
.wickens-attention-label {
  font-size: 10px; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.5px; white-space: nowrap;
}
.wickens-attention-bar {
  flex: 1; height: 6px; background: var(--bg-surface); border-radius: 3px; overflow: hidden;
}
.wickens-attention-fill {
  height: 100%; border-radius: 3px; transition: width 0.5s, background 0.3s;
}
.wickens-attention-val {
  font-size: 11px; font-family: var(--font-mono); font-weight: 600; color: var(--text-primary);
  min-width: 32px; text-align: right;
}
.wickens-attention-lines {
  height: 6px; border-left: 1px dashed var(--border);
  margin: 0 auto; width: 1px; opacity: 0.3;
}

/* Memory row (LTM + WM above main flow) */
.wickens-memory-row {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; margin-bottom: 4px;
}
.wickens-memory-arrows {
  display: flex; flex-direction: column; align-items: center; gap: 0;
  font-size: 14px; color: var(--text-muted);
}
.wickens-wm-connect {
  text-align: center; margin-bottom: 4px; color: var(--text-muted);
}

/* Main pipeline flow row */
.wickens-main-flow {
  display: flex; align-items: center; justify-content: center;
  gap: 4px; flex-wrap: nowrap;
}

/* Stage boxes (Wickens-style) */
.wickens-box {
  padding: 6px 10px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  text-align: center;
  min-width: 80px;
  transition: transform 0.15s, border-color 0.3s, box-shadow 0.3s;
}
.wickens-box:hover { transform: translateY(-1px); }
.wickens-box.selected { outline: 2px solid currentColor; outline-offset: 2px; }
.wickens-box.anomaly {
  border-color: var(--severity-critical) !important;
  box-shadow: 0 0 8px rgba(239,68,68,0.3);
  animation: bottleneck-pulse 2s ease-in-out infinite;
}
.wickens-box-label {
  font-size: 9px; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.3px; margin-bottom: 2px;
}
.wickens-box-metric {
  font-size: 13px; font-weight: 700; font-family: var(--font-mono);
}
.wickens-box-sub {
  font-size: 9px; color: var(--text-muted); margin-top: 1px;
  font-family: var(--font-mono);
}

/* Flow arrows */
.wickens-arrow {
  color: var(--text-muted); transition: opacity 0.3s;
}

/* Feedback loop indicator */
.wickens-feedback-loop {
  text-align: right; padding-right: 16px; margin-top: 2px;
}

/* ===== Working Memory Panel (left column) ===== */

.wm-panel {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.wm-panel .section-title { margin-bottom: 8px; }

.wm-items {
  display: flex;
  flex-direction: column;
  gap: 3px;
  max-height: 260px;
  overflow-y: auto;
}

.wm-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 4px;
  border-radius: 4px;
  transition: opacity 0.3s, transform 0.3s;
  font-size: 12px;
}
.wm-item.fading { opacity: 0.5; }
.wm-item.evicted { opacity: 0.25; text-decoration: line-through; }

.wm-tier-badge {
  font-size: 9px;
  font-weight: 700;
  font-family: var(--font-mono);
  padding: 1px 4px;
  border-radius: 3px;
  min-width: 20px;
  text-align: center;
}
.wm-tier-badge.l2 { background: rgba(192,132,252,0.25); color: #c084fc; }
.wm-tier-badge.l1 { background: rgba(96,165,250,0.25); color: #60a5fa; }
.wm-tier-badge.l0 { background: rgba(100,116,139,0.2); color: #94a3b8; }

.wm-item-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: width 0.3s, height 0.3s;
}

.wm-item-name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--text-primary);
}
.wm-item-meta {
  font-size: 10px;
  color: var(--text-muted);
  white-space: nowrap;
}

.wm-summary {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  font-size: 11px;
  color: var(--text-secondary);
}
.wm-summary span { white-space: nowrap; }
.wm-summary .wm-stat-value {
  font-weight: 600;
  font-family: var(--font-mono);
  color: var(--text-primary);
}

/* ===== Information Signals Panel (sparklines) ===== */

.signals-panel {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  height: 100%;
}

.signals-subtabs {
  display: flex;
  gap: 4px;
}
.signals-subtab {
  padding: 4px 10px;
  font-size: 11px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
}
.signals-subtab.active {
  background: var(--bg-surface);
  color: var(--text-primary);
  border-color: var(--phase-gathering);
}

.signal-chart {
  flex: 1;
  min-height: 120px;
  position: relative;
}
.signal-chart svg {
  width: 100%;
  height: 100%;
}
.signal-legend {
  display: flex;
  gap: 12px;
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 4px;
}
.signal-legend-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 4px;
  vertical-align: middle;
}
.signal-value {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  position: absolute;
  right: 4px;
  top: 2px;
}

/* ===== Memory Ops Timeline ===== */

.memops-panel {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow-y: auto;
}
.memops-empty {
  color: var(--text-muted);
  font-size: 13px;
  text-align: center;
  padding: 32px;
}
.memops-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  background: var(--bg-surface);
  border-radius: 6px;
  border: 1px solid var(--border);
  font-size: 12px;
}
.memops-icon {
  font-size: 14px;
  width: 20px;
  text-align: center;
}
.memops-ns {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-family: var(--font-mono);
  color: var(--text-primary);
}
.memops-step {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
}

/* ===== CAFT Annotations Panel (right column) ===== */

.annotations-panel {
  display: flex;
  flex-direction: column;
  height: 100%;
}
.annotations-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.annotations-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.annotation-card {
  padding: 8px 10px;
  margin-bottom: 6px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 12px;
}
.annotation-card-header {
  display: flex;
  align-items: center;
  gap: 6px;
}
.annotation-card-desc {
  color: var(--text-secondary);
  margin-top: 4px;
  font-size: 11px;
  line-height: 1.4;
}

/* ===== Simple View (default human-readable dashboard) ===== */

.simple-view {
  max-width: 720px;
  margin: 0 auto;
  padding: 32px 24px;
  font-family: system-ui, -apple-system, sans-serif;
}

.simple-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.simple-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.3px;
}
.view-toggle {
  display: flex;
  background: var(--bg-surface);
  border-radius: 6px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.view-toggle-btn {
  padding: 5px 14px;
  font-size: 12px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
}
.view-toggle-btn.active {
  background: var(--phase-gathering);
  color: var(--bg-base);
  font-weight: 600;
}

/* Status card */
.status-card {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px 32px;
  margin-bottom: 16px;
  transition: border-color 0.3s;
}
.status-card.alert-yellow { border-left: 3px solid #f59e0b; }
.status-card.alert-red { border-left: 3px solid #ef4444; }

.status-top {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 12px;
}

.status-dot {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: background 0.5s;
}
.status-dot.green { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.3); }
.status-dot.yellow { background: #f59e0b; box-shadow: 0 0 8px rgba(245,158,11,0.3); animation: pulse-glow 2s ease-in-out infinite; }
.status-dot.red { background: #ef4444; box-shadow: 0 0 12px rgba(239,68,68,0.4); animation: pulse-glow 1.5s ease-in-out infinite; }
@keyframes pulse-glow {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.status-message {
  font-size: 16px;
  font-weight: 500;
  color: var(--text-primary);
  line-height: 1.4;
}

.status-activity {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 16px;
}

/* Recent actions */
.recent-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 4px;
}
.recent-action {
  font-size: 12px;
  padding: 3px 10px;
  background: var(--bg-surface);
  border-radius: 4px;
  color: var(--text-secondary);
  white-space: nowrap;
}
.recent-action:last-child {
  color: var(--text-primary);
  font-weight: 500;
}
.recent-arrow {
  color: var(--text-muted);
  font-size: 11px;
  align-self: center;
}

/* Alert timeline */
.alert-timeline {
  margin-top: 20px;
}
.alert-timeline-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.alert-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;

/* Event cards in processing view */

/* Results table */

/* Expandable reasoning sections */

/* Ablation waiting/complete states */

.ablation-comparison-pre {

/* Ablation progress spinner animation for current mode */
@keyframes ablation-spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.ablation-spinner {
  width: 14px;
  height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--phase-gathering);
  border-radius: 50%;
  animation: ablation-spin 1s linear infinite;
  flex-shrink: 0;
}

/* Ablation responsive */
@media (max-width: 1280px) {
  .ablation-layout {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr auto;
  }
  .ablation-progress {
    border-right: none;
    border-bottom: 1px solid var(--border);
    max-height: 200px;
    overflow-y: auto;
  }
  .ablation-pipeline {
    border-left: none;
    border-top: 1px solid var(--border);

  }
}
</style>

<body>

<div id="root"></div>

<script type="text/babel">
/* ===================================================================
   agentdiag Dashboard -- React 18
   =================================================================== */

const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ---- Constants ----
const PHASE_NAMES = ['idle', 'gathering', 'planning', 'executing', 'verifying', 'delivering'];
const PHASE_COLORS = {
  idle: '#475569',
  gathering: '#22d3ee',
  planning: '#facc15',
  executing: '#4ade80',
  verifying: '#c084fc',
  delivering: '#60a5fa'
};
const SEVERITY_COLORS = {
  info: '#3b82f6',
  warning: '#f59e0b',
  critical: '#ef4444'
};
const HEALTH_COLORS = {
  healthy: '#4ade80',
  degraded: '#f59e0b',
  failing: '#ef4444'
};

// IP Stage constants
const IP_STAGES = ['perception', 'attention', 'working_memory', 'decision_making', 'action', 'feedback'];

const IP_STAGE_LABELS = {
  perception: 'Perception', attention: 'Attention', working_memory: 'Memory',
  decision_making: 'Decision', action: 'Action', feedback: 'Feedback',
};

const IP_STAGE_SHORT = {
  perception: 'P', attention: 'A', working_memory: 'M',
  decision_making: 'D', action: 'X', feedback: 'F',
};

const IP_STAGE_COLORS = {
  perception: '#22d3ee', attention: '#facc15', working_memory: '#c084fc',
  decision_making: '#60a5fa', action: '#4ade80', feedback: '#f472b6',
};

const STATUS_COLORS = {
  idle: 'var(--text-muted)', normal: 'var(--phase-gathering)',
  active: 'var(--phase-executing)', at_risk: 'var(--severity-warning)',
  overloaded: 'var(--severity-critical)',
};

const STAGE_DETAIL_LABELS = {
  perception: { breadth: 'Breadth', depth: 'Depth', recency: 'Recency' },
  attention: { diversity: 'Diversity', focus: 'Focus', tunnel_risk: 'Tunnel Risk' },
  working_memory: { utilization: 'Utilization', recency_bias: 'Recency Bias', at_risk_items: 'At-Risk Items' },
  decision_making: { deliberation: 'Deliberation', options_explored: 'Options Explored', latency_trend: 'Latency Trend' },
  action: { diversity: 'Diversity', success_rate: 'Success Rate', repetition_risk: 'Repetition Risk' },
  feedback: { verify_ratio: 'Verify Ratio', error_response: 'Error Response', loop_closed: 'Loop Closed' },
};

const COGNITIVE_MAX_BAR_HEIGHT = 120;
const COGNITIVE_MAX_MINIBAR_WIDTH = 40;

function cognitiveOverallColor(load) {
  if (load > 0.75) return 'var(--health-failing)';
  if (load > 0.5) return 'var(--health-degraded)';
  return 'var(--health-healthy)';
}

function retentionColor(retention) {
  if (retention > 0.7) return 'var(--health-healthy)';
  if (retention >= 0.4) return 'var(--health-degraded)';
  return 'var(--health-failing)';
}

// ---- Utilities ----
function phaseColor(phaseName) {
  return PHASE_COLORS[(phaseName || '').toLowerCase()] || PHASE_COLORS.idle;
}

function formatDuration(seconds) {
  if (!seconds || seconds < 0) return '';
  if (seconds < 60) return Math.round(seconds) + 's';
  if (seconds < 3600) return Math.round(seconds / 60) + 'm ' + Math.round(seconds % 60) + 's';
  const h = Math.floor(seconds / 3600);
  const m = Math.round((seconds % 3600) / 60);
  return h + 'h ' + m + 'm';
}

function severityColor(severity) {
  return SEVERITY_COLORS[(severity || '').toLowerCase()] || SEVERITY_COLORS.info;
}

function formatConfidenceMessage(diagnosis) {
  const conf = diagnosis.confidence || 0;
  const name = (diagnosis.failure_name || '').replace(/_/g, ' ');
  const desc = diagnosis.description || '';
  const rem = diagnosis.remediation || '';

  if (conf < 0.3) {
    return 'Watching for ' + name + '... (early signal)';
  } else if (conf < 0.6) {
    return name.charAt(0).toUpperCase() + name.slice(1) + ' may be developing. ' + desc;
  } else if (conf < 0.85) {
    return name.charAt(0).toUpperCase() + name.slice(1) + ' detected. ' + desc;
  } else {
    let msg = 'Strong ' + name + ' detected. ' + desc;
    if (rem) msg += ' ' + rem;
    return msg;
  }
}

function buildBehaviorBlocks(actions, transitions) {
  if (!actions || actions.length === 0) return [];

  const sorted = actions.slice().sort((a, b) => a.step - b.step);

  const transitionSteps = {};
  (transitions || []).forEach(t => {
    transitionSteps[t.at_step] = t;
  });

  const blocks = [];
  let currentBlock = null;

  sorted.forEach(action => {
    const phase = (action.phase || 'idle').toLowerCase();
    const tool = action.tool || 'unknown';

    let shouldBreak = false;
    if (currentBlock) {
      if (phase !== currentBlock.phase || tool !== currentBlock.tool) {
        shouldBreak = true;
      }
    }

    if (!currentBlock || shouldBreak) {
      if (currentBlock) {
        blocks.push(currentBlock);
      }

      let transHere = null;
      if (currentBlock) {
        for (let s = currentBlock.endStep + 1; s <= action.step; s++) {
          if (transitionSteps[s]) {
            transHere = transitionSteps[s];
            break;
          }
        }
        if (!transHere && phase !== currentBlock.phase) {
          transHere = {
            from_phase: currentBlock.phase,
            to_phase: phase,
            at_step: action.step,
            is_regression: PHASE_NAMES.indexOf(phase) < PHASE_NAMES.indexOf(currentBlock.phase)
          };
        }
      }

      currentBlock = {
        phase: phase,
        tool: tool,
        startStep: action.step,
        endStep: action.step,
        count: 1,
        failures: 0,
        transition: transHere
      };

      if (!action.success) currentBlock.failures++;
    } else {
      currentBlock.endStep = action.step;
      currentBlock.count++;
      if (!action.success) currentBlock.failures++;
    }
  });

  if (currentBlock) blocks.push(currentBlock);
  return blocks;
}


// ================================================================
// SessionHealth Component (Left Column)
// ================================================================
function SessionHealth({ state, sessionProfile, cognitiveState, workingMemory, infoTheoretic }) {
  const sparklineRef = useRef(null);
  const sparklineContainerRef = useRef(null);

  const phaseName = useMemo(() => (state.phase || 'idle').toLowerCase(), [state.phase]);
  const health = useMemo(() => (state.health || 'healthy').toLowerCase(), [state.health]);
  const completionRate = state.completion_rate || 0;
  const progressPct = (state.progress_pct || 0) * 100;

  // Phase balance
  const phaseEntries = useMemo(() => {
    const counts = state.phase_event_counts || {};
    const entries = [];
    PHASE_NAMES.forEach(p => {
      const c = counts[p] || 0;
      if (c > 0) entries.push({ name: p, count: c });
    });
    return entries;
  }, [state.phase_event_counts]);

  // Agents
  const agents = state.agents || {};
  const agentKeys = Object.keys(agents);
  const showAgents = !(agentKeys.length <= 1 && (agentKeys.length === 0 || agentKeys[0] === 'M'));

  // Sparkline
  useEffect(() => {
    const history = state.completion_history || [];
    const canvas = sparklineRef.current;
    const container = sparklineContainerRef.current;
    if (!canvas || !container || history.length < 2) return;

    const ctx = canvas.getContext('2d');
    const rect = container.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.scale(dpr, dpr);

    const w = rect.width;
    const h = rect.height;
    const maxVal = Math.max(...history, 100);
    const minVal = Math.min(...history, 0);
    const range = maxVal - minVal || 1;

    ctx.clearRect(0, 0, w, h);

    // Fill
    ctx.beginPath();
    history.forEach((v, i) => {
      const x = (i / (history.length - 1)) * w;
      const y = h - ((v - minVal) / range) * (h - 4) - 2;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fillStyle = 'rgba(74,222,128,0.1)';
    ctx.fill();

    // Line
    ctx.beginPath();
    history.forEach((v, i) => {
      const x = (i / (history.length - 1)) * w;
      const y = h - ((v - minVal) / range) * (h - 4) - 2;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.strokeStyle = '#4ade80';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }, [state.completion_history]);

  const completionBarColor = health === 'failing'
    ? HEALTH_COLORS.failing
    : health === 'degraded'
      ? HEALTH_COLORS.degraded
      : PHASE_COLORS.executing;

  return (
    <div id="left-col">
      {/* Session Context */}
      {state.session_context?.user_goal && (
        <div className="panel-section session-context-section">
          <div className="section-title">Session</div>
          <div className="session-goal">{state.session_context.user_goal}</div>
          <div className="session-meta-row">
            {state.session_context.project_dir && (
              <span className="session-meta-tag">{state.session_context.project_dir}</span>
            )}
            {state.total_events > 0 && (
              <span className="session-meta-tag">{state.total_events} events</span>
            )}
            {state.session_context.source_events > 0 && state.session_context.source_events !== state.total_events && (
              <span className="session-meta-tag">{state.total_events}/{state.session_context.source_events} processed</span>
            )}
          </div>
          {state.start_time && state.last_event_time && (
            <div className="session-duration">
              {formatDuration(state.last_event_time - state.start_time)}
            </div>
          )}
        </div>
      )}

      {/* Phase */}
      <div className="panel-section">
        <div className="section-title">Current Phase</div>
        <div className="current-phase-text" style={{ color: phaseColor(phaseName) }}>
          {phaseName}
        </div>
        <div className="phase-progress-bar">
          <div
            className="phase-progress-fill"
            style={{ width: progressPct + '%', background: phaseColor(phaseName) }}
          />
        </div>
      </div>

      {/* Health Status */}
      <div className="panel-section">
        <div className="section-title">Session Health</div>
        <div className={`health-badge-el ${health}`}>
          <div className="health-dot" />
          <span>{health}</span>
        </div>
        <div style={{ marginTop: 12 }}>
          <div className="stat-row">
            <span className="stat-label">Completion Rate</span>
            <span className="stat-value">{completionRate.toFixed(0)}%</span>
          </div>
          <div className="completion-bar-container">
            <div className="completion-bar-bg">
              <div
                className="completion-bar-fill-el"
                style={{ width: completionRate + '%', background: completionBarColor }}
              />
            </div>
          </div>
          <div className="sparkline-container" ref={sparklineContainerRef}>
            <canvas className="sparkline-canvas" ref={sparklineRef} />
          </div>
        </div>
      </div>

      {/* Metrics */}
      <div className="panel-section">
        <div className="section-title">Metrics</div>
        <div className="stat-row">
          <span className="stat-label">Failure Density</span>
          <span className="stat-value">{(state.failure_density || 0).toFixed(1)} / 100 events</span>
        </div>
        <div className="stat-row">
          <span className="stat-label">Total Events</span>
          <span className="stat-value">{state.total_events || 0}</span>
        </div>
        <div className="stat-row">
          <span className="stat-label">Total Errors</span>
          <span className="stat-value">{state.total_errors || 0}</span>
        </div>
        <div className="stat-row">
          <span className="stat-label">Events / min</span>
          <span className="stat-value">{(state.events_per_minute || 0).toFixed(1)}</span>
        </div>
        <div className="stat-row">
          <span className="stat-label">Phase Regressions</span>
          <span
            className="stat-value"
            style={{ color: (state.regression_count || 0) > 0 ? SEVERITY_COLORS.critical : undefined }}
          >
            {state.regression_count || 0}
          </span>
        </div>
      </div>

      {/* Phase Balance */}
      <div className="panel-section">
        <div className="section-title">Phase Balance</div>
        <div className="phase-balance">
          {phaseEntries.map(e => (
            <div
              key={e.name}
              className="phase-bar-segment"
              style={{ flex: e.count, background: phaseColor(e.name) }}
              title={e.name + ': ' + e.count}
            />
          ))}
        </div>
        <div className="phase-breakdown">
          {phaseEntries.map(e => (
            <div key={e.name} className="phase-breakdown-item">
              <div className="phase-breakdown-dot" style={{ background: phaseColor(e.name) }} />
              <span>{e.name}</span>
              <span className="phase-breakdown-count">{e.count}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Agents (conditional) */}
      {showAgents && (
        <div className="panel-section">
          <div className="section-title">Agents</div>
          <div>
            {agentKeys.map(k => {
              const agent = agents[k];
              const agentPhase = (agent.phase || 'idle').toLowerCase();
              const color = agent.active ? phaseColor(agentPhase) : '#475569';
              return (
                <div key={k} className="agent-item">
                  <div className="agent-dot" style={{ background: color }} />
                  <span className="agent-label">{agent.label || k}</span>
                  <span className="agent-phase">{agentPhase}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Session Profile (conditional) */}
      {sessionProfile && Object.keys(sessionProfile).length > 0 && (
        <div className="panel-section">
          <div className="section-title">Session Profile</div>
          <div>
            {Object.keys(sessionProfile).map(key => {
              let val = sessionProfile[key];
              if (typeof val === 'number') {
                val = val % 1 === 0 ? val : val.toFixed(3);
              }
              return (
                <div key={key} className="profile-item">
                  <span className="profile-key">{key.replace(/_/g, ' ')}</span>
                  <span className="profile-val">{String(val)}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Cognitive Load Summary (conditional) */}
      {cognitiveState && (
        <CognitiveLoadSummary cognitiveState={cognitiveState} />
      )}

      {/* Working Memory Panel (new, shows OpenViking tiers or heuristic retention) */}
      {(workingMemory || infoTheoretic) && (
        <WorkingMemoryPanel workingMemory={workingMemory} infoTheoretic={infoTheoretic} />
      )}
    </div>
  );
}

// ================================================================
// IPPipelineStrip Component (always-visible, center top)
// ================================================================
function IPPipelineStrip({ cognitiveState, infoTheoretic, anomalies, selectedStage, onStageClick, flowRates }) {
  const it = infoTheoretic || {};
  const w = (it.wickens) || {};
  const fr = flowRates || {};
  const anoms = anomalies || [];

  // Which stages have active anomalies?
  const anomalyStages = new Set(anoms.map(a => a.wickens_stage).filter(Boolean));

  // Attention resource (top overlay)
  const attention = (w.attention || {}).resource || 0;
  const attColor = attention > 0.7 ? '#f59e0b' : attention > 0.4 ? '#4ade80' : '#60a5fa';

  // Stage box helper
  const StageBox = ({ id, label, metric, unit, sublabel, color }) => {
    const isAnomaly = anomalyStages.has(id);
    const isSelected = selectedStage === id;
    return (
      <div className={'wickens-box' + (isAnomaly ? ' anomaly' : '') + (isSelected ? ' selected' : '')}
           onClick={() => onStageClick && onStageClick(id)}
           style={{ borderColor: isAnomaly ? '#ef4444' : color }}>
        <div className="wickens-box-label">{label}</div>
        <div className="wickens-box-metric" style={{ color }}>{metric}{unit}</div>
        {sublabel && <div className="wickens-box-sub">{sublabel}</div>}
      </div>
    );
  };

  // Arrow helper with flow-rate thickness
  const Arrow = ({ from, to, direction, style: extraStyle }) => {
    const key = from + '\u2192' + to;
    const rate = fr[key] || 0;
    const thickness = Math.max(1, Math.min(rate * 8, 4));
    const arrows = { down: '\u2193', up: '\u2191', right: '\u2192', left: '\u2190' };
    return (
      <span className="wickens-arrow" style={{
        fontSize: 12 + thickness * 2, opacity: 0.3 + rate * 2,
        ...extraStyle,
      }}>{arrows[direction] || '\u2192'}</span>
    );
  };

  const sensory = w.sensory || {};
  const percep = w.perceptual || {};
  const wm = w.working_memory || {};
  const ltm = w.ltm || {};
  const rsel = w.response_selection || {};
  const rexec = w.response_execution || {};
  const fb = w.feedback || {};

  return (
    <div className="wickens-strip">
      {/* Attention resources overlay */}
      <div className="wickens-attention">
        <span className="wickens-attention-label">Attention resources</span>
        <div className="wickens-attention-bar">
          <div className="wickens-attention-fill" style={{
            width: (attention * 100) + '%', background: attColor,
          }} />
        </div>
        <span className="wickens-attention-val">{(attention * 100).toFixed(0)}%</span>
      </div>
      <div className="wickens-attention-lines" />

      {/* Memory row (LTM + WM above main flow) */}
      <div className="wickens-memory-row">
        <StageBox id="ltm" label="Long-term memory"
          metric={ltm.stored_items || 0} unit=" items"
          sublabel={ltm.retrieval_rate > 0 ? 'retr: ' + (ltm.retrieval_rate * 100).toFixed(0) + '%' : null}
          color="#c084fc" />
        <div className="wickens-memory-arrows">
          <Arrow from="working_memory" to="ltm" direction="up" style={{ color: '#c084fc' }} />
          <Arrow from="ltm" to="working_memory" direction="down" style={{ color: '#60a5fa' }} />
        </div>
        <StageBox id="working_memory" label="Working memory"
          metric={(wm.memory_entropy || 0).toFixed(1)} unit="b"
          sublabel={'cons: ' + ((wm.consolidation_rate || 0) * 100).toFixed(0) + '% retr: ' + ((wm.retrieval_rate || 0) * 100).toFixed(0) + '%'}
          color="#60a5fa" />
      </div>

      {/* Connection from WM down to main pipeline */}
      <div className="wickens-wm-connect">
        <Arrow from="working_memory" to="response_selection" direction="down" />
      </div>

      {/* Main pipeline flow: sensory → perceptual → response selection → execution → feedback */}
      <div className="wickens-main-flow">
        <StageBox id="sensory" label="Sensory"
          metric={(sensory.input_entropy || 0).toFixed(1)} unit="b"
          sublabel={sensory.input_rate > 0 ? (sensory.input_rate).toFixed(0) + ' tok/evt' : null}
          color="#22d3ee" />

        <Arrow from="sensory" to="perceptual" direction="right" />

        <StageBox id="perceptual" label="Perceptual"
          metric={(percep.read_entropy || 0).toFixed(1)} unit="b"
          sublabel={'focus: ' + ((percep.focus || 0) * 100).toFixed(0) + '%'}
          color="#facc15" />

        <Arrow from="perceptual" to="response_selection" direction="right" />

        <StageBox id="response_selection" label="Response sel."
          metric={'MI: ' + (rsel.action_mi || 0).toFixed(2)} unit="b"
          sublabel={'coher: ' + ((rsel.coherence || 0) * 100).toFixed(0) + '%'}
          color="#4ade80" />

        <Arrow from="response_selection" to="response_execution" direction="right" />

        <StageBox id="response_execution" label="Execution"
          metric={'LZ: ' + (rexec.compression || 0).toFixed(2)} unit=""
          sublabel={'eff: ' + ((rexec.efficiency || 0) * 100).toFixed(0) + '%'}
          color="#f472b6" />

        <span className="wickens-arrow" style={{ fontSize: 14, opacity: 0.4 }}>{'\u2192'}</span>

        <StageBox id="feedback" label="Feedback"
          metric={'MI: ' + (fb.feedback_action_mi || 0).toFixed(2)} unit="b"
          sublabel={'adapt: ' + ((fb.adaptation || 0) * 100).toFixed(0) + '%'}
          color="#ef4444" />
      </div>

      {/* Feedback loop arrow back to sensory */}
      <div className="wickens-feedback-loop">
        <span style={{ fontSize: 10, color: 'var(--text-muted)' }}>{'\u21A9'} feedback loop</span>
      </div>
    </div>
  );
}


// ================================================================
// WorkingMemoryPanel Component (left column)
// ================================================================
function WorkingMemoryPanel({ workingMemory, infoTheoretic }) {
  const wm = workingMemory || {};
  const activeItems = wm.active_items || [];
  const atRiskItems = wm.at_risk_items || [];
  const allItems = [...activeItems, ...atRiskItems];
  const memEvents = (infoTheoretic || {}).memory_events || [];

  // Determine if we have OpenViking tier data
  const hasTiers = allItems.some(item => item.tier);

  const getTierClass = (item) => {
    if (item.tier === 'l2') return 'l2';
    if (item.tier === 'l1') return 'l1';
    if (item.tier === 'l0') return 'l0';
    // Fallback: estimate from retention
    const ret = item.retention != null ? item.retention : 1;
    if (ret > 0.7) return 'l2';
    if (ret > 0.4) return 'l1';
    return 'l0';
  };

  const getDotColor = (item, isAtRisk) => {
    if (isAtRisk) return 'var(--severity-warning)';
    const ret = item.retention != null ? item.retention : 1;
    if (ret > 0.7) return 'var(--health-healthy)';
    if (ret >= 0.4) return 'var(--health-degraded)';
    return 'var(--health-failing)';
  };

  const tierCounts = { l2: 0, l1: 0, l0: 0 };
  allItems.forEach(item => { tierCounts[getTierClass(item)]++; });

  return (
    <div className="wm-panel">
      <div className="section-title">Working Memory</div>
      <div className="wm-items">
        {activeItems.slice(0, 15).map((item, i) => (
          <div key={'a' + i} className="wm-item">
            <span className={'wm-tier-badge ' + getTierClass(item)}>
              {hasTiers ? (item.tier || '?').toUpperCase() : (getTierClass(item).toUpperCase())}
            </span>
            <div className="wm-item-dot" style={{ background: getDotColor(item, false) }} />
            <span className="wm-item-name">{item.name || item.hash || 'unknown'}</span>
            <span className="wm-item-meta">{item.accesses || 1}x</span>
          </div>
        ))}
        {atRiskItems.slice(0, 5).map((item, i) => (
          <div key={'r' + i} className="wm-item fading">
            <span className={'wm-tier-badge ' + getTierClass(item)}>
              {hasTiers ? (item.tier || '?').toUpperCase() : getTierClass(item).toUpperCase()}
            </span>
            <div className="wm-item-dot" style={{ background: 'var(--severity-warning)' }} />
            <span className="wm-item-name">{item.name || item.hash || 'unknown'}</span>
            <span className="wm-item-meta">{item.accesses || 1}x</span>
          </div>
        ))}
        {allItems.length === 0 && (
          <div style={{ color: 'var(--text-muted)', fontSize: 11, padding: '8px 0' }}>No items loaded</div>
        )}
      </div>
      <div className="wm-summary">
        <span>L2: <span className="wm-stat-value">{tierCounts.l2}</span></span>
        <span>L1: <span className="wm-stat-value">{tierCounts.l1}</span></span>
        <span>L0: <span className="wm-stat-value">{tierCounts.l0}</span></span>
        <span>{wm.utilization != null ? (
          <>Util: <span className="wm-stat-value">{(wm.utilization * 100).toFixed(0)}%</span></>
        ) : null}</span>
      </div>
    </div>
  );
}


// ================================================================
// Sparkline SVG Component (reusable, with phase markers)
// ================================================================
function SparklineSVG({ data, width, height, color, phaseMarkers, evaluationEvents, anomalies, maxStep, label, currentValue, rangeStart, rangeEnd }) {
  if (!data || data.length < 2) {
    return (
      <div style={{ width, height, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <span style={{ color: 'var(--text-muted)', fontSize: 11 }}>Collecting data...</span>
      </div>
    );
  }

  // Apply range selection for zoomed view
  const rStart = rangeStart != null ? rangeStart : 0;
  const rEnd = rangeEnd != null ? rangeEnd : data.length - 1;
  const sliced = data.slice(rStart, rEnd + 1);
  const sliceMaxVal = Math.max(...sliced, 0.01);

  const points = sliced.map((v, i) => {
    const x = (i / Math.max(sliced.length - 1, 1)) * width;
    const y = height - 4 - ((v / sliceMaxVal) * (height - 8));
    return x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ');

  const effectiveMaxStep = maxStep || data.length;
  const markers = (phaseMarkers || []).filter(([step]) => step >= rStart && step <= rEnd);
  const evals = (evaluationEvents || []).filter(ev => (ev.step || 0) >= rStart && (ev.step || 0) <= rEnd);
  const anoms = (anomalies || []).filter(a => (a.step || 0) >= rStart && (a.step || 0) <= rEnd);

  const stepToX = (step) => ((step - rStart) / Math.max(rEnd - rStart, 1)) * width;

  // Severity colors for anomaly bands
  const sevColor = (sev) => {
    if (sev === 'critical') return 'rgba(239,68,68,0.15)';
    if (sev === 'warning') return 'rgba(245,158,11,0.12)';
    return 'rgba(59,130,246,0.08)';
  };
  const sevBorder = (sev) => {
    if (sev === 'critical') return '#ef4444';
    if (sev === 'warning') return '#f59e0b';
    return '#3b82f6';
  };

  return (
    <div style={{ position: 'relative' }}>
      {label && <div style={{ fontSize: 11, color: 'var(--text-secondary)', marginBottom: 2 }}>{label}</div>}
      {currentValue != null && (
        <span className="signal-value">{currentValue}</span>
      )}
      <svg width={width} height={height} style={{ display: 'block' }}>
        {/* Anomaly highlight bands */}
        {anoms.map((a, idx) => {
          const x = stepToX(a.step);
          const bandW = Math.max(width / Math.max(rEnd - rStart, 1) * 3, 6);
          return (
            <g key={'a' + idx}>
              <rect x={x - bandW/2} y={0} width={bandW} height={height}
                    fill={sevColor(a.severity)} rx="2" />
              <line x1={x} y1={0} x2={x} y2={height}
                    stroke={sevBorder(a.severity)} strokeWidth="1" opacity="0.6" />
              <title>{a.signature}: {a.interpretation ? a.interpretation.slice(0, 80) : ''}</title>
            </g>
          );
        })}
        {/* Data line */}
        <polyline points={points} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" />
        {/* Phase boundary vertical lines */}
        {markers.map(([step, sym], idx) => {
          const x = stepToX(step);
          return (
            <line key={'p' + idx} x1={x} y1={0} x2={x} y2={height}
                  stroke="var(--text-muted)" strokeDasharray="3,3" strokeWidth="1" opacity="0.5">
              <title>{sym}</title>
            </line>
          );
        })}
        {/* Evaluation markers */}
        {evals.map((ev, idx) => {
          const step = ev.step || 0;
          const score = ev.evaluation_score != null ? ev.evaluation_score : 0.5;
          const x = stepToX(step);
          const evColor = score >= 0.7 ? 'var(--health-healthy)' : score >= 0.4 ? 'var(--health-degraded)' : 'var(--health-failing)';
          // Step range band if available
          const sr = ev.step_range || (ev.metadata || {}).step_range;
          return (
            <g key={'e' + idx}>
              {sr && (
                <rect x={stepToX(sr[0])} y={0} width={stepToX(sr[1]) - stepToX(sr[0])} height={height}
                      fill={score >= 0.7 ? 'rgba(74,222,128,0.06)' : 'rgba(239,68,68,0.06)'} />
              )}
              <line x1={x} y1={0} x2={x} y2={height} stroke={evColor} strokeWidth="1.5" opacity="0.6" />
              <circle cx={x} cy={4} r={4} fill={evColor} opacity="0.9">
                <title>Eval: {ev.evaluation_criterion || 'overall'} = {(score * 100).toFixed(0)}%{ev.sprint_number ? ' (sprint ' + ev.sprint_number + ')' : ''}</title>
              </circle>
            </g>
          );
        })}
      </svg>
      {/* Anomaly badges below sparkline */}
      {anoms.length > 0 && (
        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', marginTop: 2 }}>
          {anoms.slice(0, 5).map((a, i) => (
            <span key={i} style={{
              fontSize: 9, padding: '1px 5px', borderRadius: 3,
              background: sevColor(a.severity), border: '1px solid ' + sevBorder(a.severity),
              color: sevBorder(a.severity), fontWeight: 600,
            }}>{a.signature === 'unclassified_anomaly' ? 'NOVEL' : a.signature.replace(/_/g, ' ')}</span>
          ))}
          {anoms.length > 5 && <span style={{ fontSize: 9, color: 'var(--text-muted)' }}>+{anoms.length - 5} more</span>}
        </div>
      )}
    </div>
  );
}

// Overview sparkline with brush selection for zoom control
function SparklineOverview({ data, width, height, color, rangeStart, rangeEnd, onBrush }) {
  if (!data || data.length < 2) return null;
  const maxVal = Math.max(...data, 0.01);
  const points = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - 1 - ((v / maxVal) * (height - 2));
    return x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ');

  const rs = rangeStart != null ? rangeStart : 0;
  const re = rangeEnd != null ? rangeEnd : data.length - 1;
  const selX = (rs / (data.length - 1)) * width;
  const selW = ((re - rs) / (data.length - 1)) * width;

  const handleClick = (e) => {
    if (!onBrush) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    const clickIdx = Math.round((clickX / width) * (data.length - 1));
    // Center a 50-point window on click
    const halfWin = 25;
    const newStart = Math.max(0, clickIdx - halfWin);
    const newEnd = Math.min(data.length - 1, clickIdx + halfWin);
    onBrush(newStart, newEnd);
  };

  return (
    <svg width={width} height={height} style={{ display: 'block', cursor: onBrush ? 'crosshair' : 'default' }}
         onClick={handleClick}>
      <polyline points={points} fill="none" stroke={color} strokeWidth="1" opacity="0.4" />
      {/* Selection highlight */}
      <rect x={selX} y={0} width={Math.max(selW, 2)} height={height}
            fill={color} opacity="0.15" rx="1" />
      <line x1={selX} y1={0} x2={selX} y2={height} stroke={color} strokeWidth="0.5" opacity="0.5" />
      <line x1={selX + selW} y1={0} x2={selX + selW} y2={height} stroke={color} strokeWidth="0.5" opacity="0.5" />
    </svg>
  );
}

// ================================================================
// BehaviorTimeline Component
// ================================================================
function BehaviorTimeline({ state, onBlockClick }) {
  const scrollRef = useRef(null);
  const [selectedBlock, setSelectedBlock] = useState(null);

  const actions = state.actions || [];
  const blocks = useMemo(
    () => buildBehaviorBlocks(actions, state.transitions),
    [actions, state.transitions]
  );

  // Auto-scroll to end when blocks change
  useEffect(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollLeft = scrollRef.current.scrollWidth;
    }
  }, [blocks]);

  const handleBlockClick = useCallback((block, idx) => {
    setSelectedBlock(idx);
    if (onBlockClick) {
      onBlockClick(block.startStep, block.endStep);
    }
  }, [onBlockClick]);

  if (actions.length === 0) {
    return (
      <div className="timeline-panel">
        <div className="timeline-scroll">
          <div className="timeline-empty">No events yet</div>
        </div>
      </div>
    );
  }

  return (
    <div className="timeline-panel">
      <div className="timeline-scroll" ref={scrollRef}>
        {blocks.map((block, idx) => {
          const elements = [];

          // Transition divider
          if (block.transition) {
            const isReg = block.transition.is_regression;
            elements.push(
              <div key={`trans-${idx}`} className="phase-transition-divider">
                <div className={`transition-line${isReg ? ' regression' : ''}`} />
                <div
                  className={`transition-arrow${isReg ? ' regression' : ''}`}
                  dangerouslySetInnerHTML={{ __html: isReg ? '&#9664;' : '&#9654;' }}
                />
              </div>
            );
          }

          const barHeight = Math.max(24, Math.min(64, 24 + block.count * 2));
          const isSelected = selectedBlock === idx;

          elements.push(
            <div
              key={`block-${idx}`}
              className={`behavior-block${isSelected ? ' selected' : ''}`}
              data-start={block.startStep}
              data-end={block.endStep}
              onClick={() => handleBlockClick(block, idx)}
            >
              <div
                className={`block-bar${block.failures > 0 ? ' has-failures' : ''}`}
                style={{ height: barHeight + 'px', background: phaseColor(block.phase) }}
              >
                {block.count}
              </div>
              <div className="block-label">{block.tool}</div>
              <div className="block-step-range">
                {block.startStep === block.endStep
                  ? '#' + block.startStep
                  : '#' + block.startStep + '-' + block.endStep}
              </div>
            </div>
          );

          return elements;
        })}
      </div>
    </div>
  );
}


// ================================================================
// DiagnosisCard Component
// ================================================================
function DiagnosisCard({ diagnosis, onStepClick, ipStage, onIPStageClick }) {
  const [evidenceVisible, setEvidenceVisible] = useState(false);

  const severity = (diagnosis.severity || 'info').toLowerCase();
  const severityLabel = severity.charAt(0).toUpperCase() + severity.slice(1);
  const confPct = ((diagnosis.confidence || 0) * 100).toFixed(0);
  const confColor = severityColor(severity);
  const evidence = diagnosis.evidence || {};
  const evidenceKeys = Object.keys(evidence);

  const cardRef = useRef(null);

  return (
    <div
      className="diagnosis-card"
      data-step={diagnosis.at_step || 0}
      ref={cardRef}
    >
      {/* Header */}
      <div className="diagnosis-header">
        <span className={`severity-badge ${severity}`}>{severityLabel}</span>
        <span className="diagnosis-caft-code">CAFT {diagnosis.caft_code || ''}</span>
        {ipStage && (
          <span
            className="ip-stage-tag"
            style={{ background: IP_STAGE_COLORS[ipStage] || 'var(--text-muted)' }}
            onClick={(e) => { e.stopPropagation(); onIPStageClick && onIPStageClick(ipStage); }}
            title={'IP Stage: ' + (IP_STAGE_LABELS[ipStage] || ipStage)}
          >
            {IP_STAGE_LABELS[ipStage] || ipStage}
          </span>
        )}
        <span
          className="diagnosis-step-link"
          onClick={() => onStepClick && onStepClick(diagnosis.at_step || 0)}
        >
          at step {diagnosis.at_step || 0}
        </span>
      </div>

      {/* Confidence bar */}
      <div className="confidence-bar-container-diag">
        <div className="confidence-bar-bg">
          <div
            className="confidence-bar-fill"
            style={{ width: confPct + '%', background: confColor }}
          />
        </div>
        <span className="confidence-label">{confPct}%</span>
      </div>

      {/* Message */}
      <div className="diagnosis-message">{formatConfidenceMessage(diagnosis)}</div>

      {/* Remediation (only conf > 0.6) */}
      {(diagnosis.confidence || 0) > 0.6 && diagnosis.remediation && (
        <div className="diagnosis-remediation">{diagnosis.remediation}</div>
      )}

      {/* Evidence (expandable) */}
      {evidenceKeys.length > 0 && (
        <>
          <button
            className="evidence-toggle"
            onClick={() => setEvidenceVisible(!evidenceVisible)}
          >
            <span dangerouslySetInnerHTML={{ __html: evidenceVisible ? '&#9660;' : '&#9654;' }} />
            {' '}Evidence ({evidenceKeys.length} fields)
          </button>
          {evidenceVisible && (
            <table className="evidence-table">
              <tbody>
                {evidenceKeys.map(key => (
                  <tr key={key}>
                    <td>{key}</td>
                    <td>{String(evidence[key])}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </>
      )}
    </div>
  );
}


// ================================================================
// DiagnosisPanel Component
// ================================================================
function DiagnosisPanel({ state, onStepClick, highlightRange, ipStageMap, onIPStageClick }) {
  const diagnoses = state.diagnoses || [];
  const listRef = useRef(null);

  // Scroll to matching diagnosis when highlightRange changes
  useEffect(() => {
    if (!highlightRange || !listRef.current) return;
    const cards = listRef.current.querySelectorAll('.diagnosis-card');
    for (let i = 0; i < cards.length; i++) {
      const step = parseInt(cards[i].getAttribute('data-step'), 10);
      if (step >= highlightRange.start && step <= highlightRange.end) {
        cards[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
        cards[i].style.borderColor = '#22d3ee';
        const card = cards[i];
        setTimeout(() => { card.style.borderColor = ''; }, 2000);
        return;
      }
    }
  }, [highlightRange]);

  if (diagnoses.length === 0) {
    return (
      <div className="diagnoses-panel">
        <div className="diagnoses-empty">
          <div>
            <span className="healthy-icon">&#10003;</span>
            Session healthy -- no issues detected
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="diagnoses-panel">
      <div ref={listRef}>
        {diagnoses.map((d, i) => (
          <DiagnosisCard
            key={`${d.caft_code}-${d.at_step}-${i}`}
            diagnosis={d}
            onStepClick={onStepClick}
            ipStage={ipStageMap ? ipStageMap[d.caft_code] : null}
            onIPStageClick={onIPStageClick}
          />
        ))}
      </div>
    </div>
  );
}


// ================================================================
// LLMDecisionsLog Component (Right Column)
