function LLMDecisionsLog({ state, onDetectorClick }) {
  const snapshots = state.detector_snapshots || [];

  const sorted = useMemo(() => {
    return snapshots.slice().sort((a, b) => {
      if (a.fired !== b.fired) return a.fired ? -1 : 1;
      return (b.confidence || 0) - (a.confidence || 0);
    });
  }, [snapshots]);

  return (
    <div id="right-col">
      <div className="llm-header">
        <div className="section-title">LLM Decisions</div>
        <div className="llm-stats">
          <div className="llm-stat">
            <div className="llm-stat-dot total" />
            <span className="llm-stat-label">Total</span>
            <span className="llm-stat-value">{state.candidates_total || 0}</span>
          </div>
          <div className="llm-stat">
            <div className="llm-stat-dot autoconfirmed" />
            <span className="llm-stat-label">Auto</span>
            <span className="llm-stat-value">{state.candidates_autoconfirmed || 0}</span>
          </div>
          <div className="llm-stat">
            <div className="llm-stat-dot confirmed" />
            <span className="llm-stat-label">Confirmed</span>
            <span className="llm-stat-value">{state.candidates_confirmed || 0}</span>
          </div>
          <div className="llm-stat">
            <div className="llm-stat-dot rejected" />
            <span className="llm-stat-label">Rejected</span>
            <span className="llm-stat-value">{state.candidates_rejected || 0}</span>
          </div>
          <div className="llm-stat">
            <div className="llm-stat-dot uncertain" />
            <span className="llm-stat-label">Uncertain</span>
            <span className="llm-stat-value">{state.candidates_uncertain || 0}</span>
          </div>
        </div>
      </div>
      <div className="llm-log">
        {sorted.length === 0 ? (
          <div className="llm-log-empty">No detector snapshots yet</div>
        ) : (
          sorted.map((snap, i) => {
            const detectorName = snap.detector || 'unknown';
            const conf = snap.confidence || 0;
            const fired = snap.fired;
            const gateFailed = snap.gate_failed || '';

            return (
              <div key={`${detectorName}-${i}`} className="llm-snapshot-item">
                <div className="llm-snapshot-header">
                  <span className={`snapshot-fired-badge ${fired ? 'fired' : 'not-fired'}`}>
                    {fired ? 'FIRED' : 'QUIET'}
                  </span>
                  <span
                    className="detector-name-link"
                    onClick={() => onDetectorClick && onDetectorClick(detectorName)}
                  >
                    {detectorName}
                  </span>
                  <span className="snapshot-confidence">{(conf * 100).toFixed(0)}%</span>
                </div>
                {!fired && gateFailed && (
                  <div className="snapshot-decision">Gate: {gateFailed}</div>
                )}
                {snap.step !== undefined && (
                  <div className="snapshot-decision">Step {snap.step}</div>
                )}
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}


// ================================================================
// DecisionTrace Component (Heatmap)
// ================================================================
function DecisionTrace({ traceData }) {
  if (!traceData) {
    return (
      <div className="decision-trace-panel">
        <div className="trace-unavailable">
          Decision trace not available for this session.
        </div>
      </div>
    );
  }

  const snapshots = traceData.detector_snapshots || [];
  if (snapshots.length === 0) {
    return (
      <div className="decision-trace-panel">
        <div className="trace-unavailable">
          Decision trace not available for this session.
        </div>
      </div>
    );
  }

  // Collect detectors and steps
  const { detectors, displaySteps, lookup } = useMemo(() => {
    const detectorSet = {};
    const stepSet = {};
    snapshots.forEach(snap => {
      detectorSet[snap.detector] = true;
      stepSet[snap.step] = true;
    });

    const dets = Object.keys(detectorSet).sort();
    const allSteps = Object.keys(stepSet).map(Number).sort((a, b) => a - b);

    let ds = allSteps;
    if (allSteps.length > 100) {
      const interval = Math.ceil(allSteps.length / 100);
      ds = allSteps.filter((_, i) => i % interval === 0);
    }

    const lk = {};
    snapshots.forEach(snap => {
      lk[snap.step + ':' + snap.detector] = snap;
    });

    return { detectors: dets, displaySteps: ds, lookup: lk };
  }, [snapshots]);

  return (
    <div className="decision-trace-panel">
      <div className="heatmap-container">
        <table className="heatmap-table">
          <thead>
            <tr>
              <th>Step</th>
              {detectors.map(d => (
                <th key={d}>{d.replace(/_/g, ' ')}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {displaySteps.map(step => (
              <tr key={step}>
                <td>{step}</td>
                {detectors.map(d => {
                  const key = step + ':' + d;
                  const snap = lookup[key];
                  if (!snap) {
                    return (
                      <td key={d}><span className="heatmap-cell not-checked" /></td>
                    );
                  } else if (snap.fired) {
                    return (
                      <td key={d}>
                        <span className="heatmap-cell fired">
                          <span className="heatmap-tooltip">
                            FIRED conf={(((snap.confidence || 0) * 100).toFixed(0))}%
                          </span>
                        </span>
                      </td>
                    );
                  } else {
                    const reason = snap.gate_failed || 'not fired';
                    return (
                      <td key={d}>
                        <span className="heatmap-cell gate-failed">
                          <span className="heatmap-tooltip">{reason}</span>
                        </span>
                      </td>
                    );
                  }
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

    setLoading(true);
    setContent(null);

    fetch('/api/decision-trace?detector=' + encodeURIComponent(detectorName))
      .then(r => {
        if (!r.ok) throw new Error('Not found');
        return r.json();
      })
      .then(data => {
        const items = Array.isArray(data) ? data : (data.snapshots || data.timeline || [data]);
        setContent(items);
        setLoading(false);
      })
      .catch(() => {
        setContent([]);
        setLoading(false);
      });
  }, [visible, detectorName]);

  // Escape key
  useEffect(() => {
    if (!visible) return;
    const handler = (e) => {
      if (e.key === 'Escape') onClose();
    };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [visible, onClose]);

  const handleOverlayClick = useCallback((e) => {
    if (e.target === e.currentTarget) onClose();
  }, [onClose]);

  return (
    <div
      className={`detector-detail-overlay${visible ? ' visible' : ''}`}
      onClick={handleOverlayClick}
    >
      <div className="detector-detail-modal">
        <button className="modal-close" onClick={onClose}>&times;</button>
        <h3>{(detectorName || '').replace(/_/g, ' ')}</h3>
        <div className="detector-detail-content">
          {loading && (
            <div style={{ color: 'var(--text-muted)', padding: 20, textAlign: 'center' }}>
              Loading...
            </div>
          )}
          {!loading && content && content.length === 0 && (
            <div style={{ color: 'var(--text-muted)', padding: 20, textAlign: 'center' }}>
              No detailed timeline available for this detector.
            </div>
          )}
          {!loading && content && content.length > 0 && content.map((snap, i) => {
            const fired = snap.fired;
            const conf = snap.confidence || 0;
            const step = snap.step !== undefined ? snap.step : '?';
            const gate = snap.gate_failed || '';
            const preview = snap.evidence_preview || '';

            return (
              <div key={i} className="detector-timeline-item">
                <span className="detector-timeline-step">Step {step}</span>
                <span className={`snapshot-fired-badge ${fired ? 'fired' : 'not-fired'}`}>
                  {fired ? 'FIRED' : 'QUIET'}
                </span>
                <span
                  className="detector-timeline-conf"
                  style={{ color: conf > 0.6 ? SEVERITY_COLORS.warning : 'var(--text-muted)' }}
                >
                  {(conf * 100).toFixed(0)}%
                </span>
                {gate && <span className="detector-timeline-gate">{gate}</span>}
                {preview && <span className="detector-timeline-gate">{preview}</span>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}


// ================================================================
// CognitiveLoadMonitor Component (Center Tab)
// ================================================================
function CognitiveLoadMonitor({
  cognitiveState, selectedStage, onStageClick,
  memoryDetail, decisionsDetail, onFetchMemory, onFetchDecisions
}) {
  // Unavailable state
  if (!cognitiveState) {
    return (
      <div className="cognitive-unavailable">
        <div>
          Cognitive Load Monitor not available.<br />
          <code>Enable with: agentdiag visualize --cognitive</code>
        </div>
      </div>
    );
  }

  const overall = cognitiveState.overall_cognitive_load || 0;
  const bottleneck = cognitiveState.bottleneck_stage;

  // Trigger lazy fetches when detail stage opens
  const prevDetailRef = useRef(null);
  useEffect(() => {
    if (selectedStage === prevDetailRef.current) return;
    prevDetailRef.current = selectedStage;
    if (selectedStage === 'working_memory' && !memoryDetail) {
      onFetchMemory && onFetchMemory();
    }
    if (selectedStage === 'decision_making' && !decisionsDetail) {
      onFetchDecisions && onFetchDecisions();
    }
  }, [selectedStage, memoryDetail, decisionsDetail, onFetchMemory, onFetchDecisions]);

  function formatMetricValue(key, value) {
    if (value == null) return '-';
    if (typeof value === 'number' && key !== 'at_risk_items') return (value * 100).toFixed(0) + '%';
    return String(value);
  }

  function renderStageDetail(stage) {
    const data = cognitiveState[stage] || {};
    const statusLabel = (data.status || 'idle').replace(/_/g, ' ');
    const statusColor = STATUS_COLORS[data.status] || STATUS_COLORS.idle;
    const labels = STAGE_DETAIL_LABELS[stage] || {};

    return (
      <div className="stage-detail-panel">
        <div className="stage-detail-title">
          <span>{IP_STAGE_LABELS[stage]}</span>
          <span className="stage-detail-status" style={{ background: statusColor, color: 'var(--bg-base)' }}>
            {statusLabel}
          </span>
        </div>

        {/* Sub-metric cards */}
        <div className="stage-detail-metrics">
          {Object.entries(labels).map(([key, label]) => (
            <div key={key} className="stage-metric-card">
              <div className="stage-metric-value">{formatMetricValue(key, data[key])}</div>
              <div className="stage-metric-label">{label}</div>
            </div>
          ))}
        </div>

        {/* Working Memory: memory items */}
        {stage === 'working_memory' && (
          <div>
            {memoryDetail && memoryDetail.active_items && memoryDetail.active_items.length > 0 && (
              <div className="memory-items-section">
                <div className="memory-items-title">Active Items</div>
                {memoryDetail.active_items.map((item, i) => {
                  const ret = item.retention != null ? item.retention : 1;
                  const retCol = retentionColor(ret);
                  return (
                    <div key={i} className="memory-item">
                      <div className="memory-item-dot" style={{ background: retCol }} />
                      <span className="memory-item-name">{item.name || item.hash || 'unknown'}</span>
                      <span className="memory-item-meta">step {item.step}, {item.accesses}x</span>
                      <div className="memory-item-retention-bar">
                        <div className="memory-item-retention-fill" style={{ width: (ret * 100) + '%', background: retCol }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            {memoryDetail && memoryDetail.at_risk_items && memoryDetail.at_risk_items.length > 0 && (
              <div className="memory-items-section">
                <div className="memory-items-title" style={{ color: 'var(--severity-warning)' }}>At-Risk Items</div>
                {memoryDetail.at_risk_items.map((item, i) => (
                  <div key={i} className="memory-item">
                    <div className="memory-item-dot" style={{ background: 'var(--severity-warning)' }} />
                    <span className="memory-item-name">{item.name || item.hash || 'unknown'}</span>
                    <span className="memory-item-meta">step {item.step}, {item.accesses}x</span>
                  </div>
                ))}
              </div>
            )}
            {!memoryDetail && (
              <div className="stage-detail-loading">Loading memory items...</div>
            )}
          </div>
        )}

        {/* Decision Making: decisions list + quality metrics */}
        {stage === 'decision_making' && (
          <div>
            {decisionsDetail && decisionsDetail.metrics && (
              <div className="decision-quality-grid">
                {decisionsDetail.metrics.success_rate != null && (
                  <div className="decision-quality-item">
                    <span className="label">Success Rate</span>
                    <span className="value">{(decisionsDetail.metrics.success_rate * 100).toFixed(0)}%</span>
                  </div>
                )}
                {decisionsDetail.metrics.avg_deliberation_ms != null && (
                  <div className="decision-quality-item">
                    <span className="label">Avg Deliberation</span>
                    <span className="value">{decisionsDetail.metrics.avg_deliberation_ms.toFixed(0)}ms</span>
                  </div>
                )}
                {decisionsDetail.metrics.verification_rate != null && (
                  <div className="decision-quality-item">
                    <span className="label">Verification Rate</span>
                    <span className="value">{(decisionsDetail.metrics.verification_rate * 100).toFixed(0)}%</span>
                  </div>
                )}
                {decisionsDetail.metrics.strategy_change_rate != null && (
                  <div className="decision-quality-item">
                    <span className="label">Strategy Changes</span>
                    <span className="value">{(decisionsDetail.metrics.strategy_change_rate * 100).toFixed(0)}%</span>
                  </div>
                )}
              </div>
            )}
            {decisionsDetail && decisionsDetail.decisions && decisionsDetail.decisions.length > 0 && (
              <div className="decisions-list">
                <div className="memory-items-title">Recent Decisions</div>
                {decisionsDetail.decisions.slice(-10).map((dec, i) => (
                  <div key={i} className="decision-item">
                    <span className="decision-step">#{dec.action_step}</span>
                    <span className="decision-tool">{dec.action_tool || ''}</span>
                    <span className={'decision-success ' + (dec.action_success ? 'yes' : 'no')}>
                      {dec.action_success ? 'OK' : 'FAIL'}
                    </span>
                    <span className="decision-delib">
                      {dec.reasoning_duration_ms != null ? dec.reasoning_duration_ms.toFixed(0) + 'ms' : ''}
                    </span>
                  </div>
                ))}
              </div>
            )}
            {!decisionsDetail && (
              <div className="stage-detail-loading">Loading decision points...</div>
            )}
          </div>
        )}
      </div>
    );
  }

  return (
    <div>
      {/* Overall cognitive load bar */}
      <div className="cognitive-overall">
        <span className="cognitive-overall-label">Overall Cognitive Load</span>
        <div className="cognitive-overall-bar">
          <div
            className="cognitive-overall-fill"
            style={{
              width: (overall * 100) + '%',
              background: cognitiveOverallColor(overall)
            }}
          />
        </div>
        <span className="cognitive-overall-pct">{(overall * 100).toFixed(0)}%</span>
        {bottleneck && (
          <span className="cognitive-bottleneck" style={{ color: 'var(--severity-warning)' }}>
            Bottleneck: {IP_STAGE_LABELS[bottleneck] || bottleneck}
          </span>
        )}
      </div>

      {/* Pipeline visualization */}
      <div className="cognitive-pipeline">
        {IP_STAGES.map((stage, idx) => {
          const data = cognitiveState[stage] || { load: 0, status: 'idle' };
          const load = data.load || 0;
          const barHeight = Math.max(8, load * COGNITIVE_MAX_BAR_HEIGHT);
          const barColor = STATUS_COLORS[data.status] || STATUS_COLORS.idle;
          const isBottleneck = stage === bottleneck;
          const isSelected = selectedStage === stage;
          const nextStage = IP_STAGES[idx + 1];
          const nextIsBottleneck = nextStage === bottleneck;

          return (
            <React.Fragment key={stage}>
              <div
                className={'cognitive-stage' + (isBottleneck ? ' bottleneck' : '')}
                onClick={() => onStageClick(stage)}
              >
                <div
                  className="stage-bar"
                  style={{
                    height: barHeight + 'px',
                    background: barColor,
                    outline: isSelected ? '2px solid ' + barColor : 'none',
                    outlineOffset: '2px'
                  }}
                />
                <div className="stage-label">{IP_STAGE_LABELS[stage]}</div>
                <div className="stage-load-pct">{(load * 100).toFixed(0)}%</div>
                <div className="stage-status-label" style={{ color: barColor }}>{(data.status || 'idle').replace(/_/g, ' ')}</div>
              </div>
              {idx < IP_STAGES.length - 1 && (
                <span className={'stage-flow-arrow' + (nextIsBottleneck ? ' bottleneck-target' : '')}>
                  &rarr;
                </span>
              )}
            </React.Fragment>
          );
        })}
      </div>

      {/* Stage detail panel */}
      {selectedStage && cognitiveState[selectedStage] && renderStageDetail(selectedStage)}
    </div>
  );
}


// ================================================================
// AblationProgress Component (Left Column)
// ================================================================
const ABLATION_MODES = ['strict', 'loose', 'loose+llm', 'oracle'];

function AblationProgress({ phase, currentMode, modesCompleted, totalSessions, reports, sessionsProcessed, currentSession, currentSessionDetections }) {
  const completed = modesCompleted || [];
  const reps = reports || {};
  const sessDone = sessionsProcessed || 0;
  const sessTotal = totalSessions || 0;
  const sessPct = sessTotal > 0 ? Math.round((sessDone / sessTotal) * 100) : 0;

  return (
    <div className="ablation-progress">
      {/* Phase status */}
      <div className="panel-section">
        <div className="section-title">Ablation Status</div>
        <div className="current-phase-text" style={{ color: phase === 'complete' ? 'var(--health-healthy)' : (phase === 'running' || phase === 'setup') ? 'var(--phase-gathering)' : 'var(--text-muted)' }}>
          {phase === 'complete' ? 'Complete' : phase === 'setup' ? 'Setting Up' : phase === 'running' ? 'Running' : 'Idle'}
        </div>
        {phase === 'setup' && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 8 }}>
            <div className="ablation-spinner" />
            <span style={{ fontSize: 13, color: 'var(--text-secondary)' }}>Loading annotations and traces...</span>
          </div>
        )}
        {currentMode && phase === 'running' && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 8 }}>
            <div className="ablation-spinner" />
            <span style={{ fontSize: 13, color: 'var(--text-secondary)' }}>Processing: <strong style={{ color: 'var(--text-primary)' }}>{currentMode}</strong></span>
          </div>
        )}
      </div>

      {/* Session scanning progress */}
      {phase === 'running' && sessTotal > 0 && (
        <div className="panel-section">
          <div className="section-title">Session Progress</div>
          <div className="stat-row">
            <span className="stat-label">Scanning</span>
            <span className="stat-value">{sessDone} / {sessTotal}</span>
          </div>
          <div className="completion-bar-container" style={{ marginTop: 4 }}>
            <div className="completion-bar-bg">
              <div
                className="completion-bar-fill-el"
                style={{ width: sessPct + '%', background: 'var(--phase-executing)' }}
              />
            </div>
          </div>
          {currentSession && (
            <div style={{ marginTop: 8, fontSize: 12 }}>
              <span style={{ color: 'var(--text-muted)' }}>Current: </span>
              <span style={{ fontFamily: 'monospace', color: 'var(--text-secondary)' }}>{currentSession}</span>
              {currentSessionDetections && currentSessionDetections.length > 0 && (
                <div style={{ marginTop: 4 }}>
                  {currentSessionDetections.map((d, i) => (
                    <span key={i} style={{
                      display: 'inline-block', padding: '1px 6px', marginRight: 4, marginTop: 2,
                      borderRadius: 4, fontSize: 11, fontWeight: 600,
                      background: 'rgba(239,68,68,0.15)', color: 'var(--severity-critical)'
                    }}>{d}</span>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* Mode progress */}
      <div className="panel-section">
        <div className="section-title">Modes</div>
        <div className="stat-row">
          <span className="stat-label">Completed</span>
          <span className="stat-value">{completed.length} / {ABLATION_MODES.length}</span>
        </div>
        <div className="completion-bar-container" style={{ marginTop: 8 }}>
          <div className="completion-bar-bg">
            <div
              className="completion-bar-fill-el"
              style={{ width: ((completed.length / ABLATION_MODES.length) * 100) + '%', background: 'var(--phase-gathering)' }}
            />
          </div>
        </div>
      </div>

      {/* Mode checklist */}
      <div className="panel-section">
        <div className="section-title">Mode Checklist</div>
        {ABLATION_MODES.map(mode => {
          const isCompleted = completed.includes(mode);
          const isCurrent = currentMode === mode && phase === 'running';
          const isPending = !isCompleted && !isCurrent;
          const report = reps[mode];
          const f1 = report ? report.macro_f1 : null;

          let iconClass = 'pending';
          let iconContent = '';
          if (isCompleted) {
            iconClass = 'completed';
            iconContent = '\u2713';
          } else if (isCurrent) {
            iconClass = 'current';
            iconContent = '\u2022';
          }

          return (
            <div key={mode} className="mode-item">
              <div className={'mode-item-icon ' + iconClass}>{iconContent}</div>
              <span className={'mode-item-label' + (isPending ? ' pending' : '')}>{mode}</span>
              {f1 !== null && f1 !== undefined && (
                <span className="mode-item-f1">F1: {(f1 || 0).toFixed(3)}</span>
              )}
            </div>
          );
        })}
      </div>

      {/* Per-mode F1 summary (when we have results) */}
      {completed.length > 0 && (
        <div className="panel-section">
          <div className="section-title">F1 Scores</div>
          {completed.map(mode => {
            const report = reps[mode];
            if (!report) return null;
            return (
              <div key={mode} className="stat-row">
                <span className="stat-label">{mode}</span>
                <span className="stat-value" style={{ color: 'var(--phase-gathering)' }}>{(report.macro_f1 || 0).toFixed(3)}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


// ================================================================
// AblationEventCard Component
// ================================================================
function GtBadge({ gt }) {
  if (!gt) return null;
  const colors = {
    TP: { bg: 'rgba(74,222,128,0.2)', color: '#4ade80' },
    FP: { bg: 'rgba(239,68,68,0.2)', color: '#ef4444' },
    TN: { bg: 'rgba(96,165,250,0.2)', color: '#60a5fa' },
    FN: { bg: 'rgba(245,158,11,0.2)', color: '#f59e0b' },
  };
  const c = colors[gt] || colors.TN;
  return (
    <span style={{
      display: 'inline-block', padding: '1px 5px', borderRadius: 3,
      fontSize: 10, fontWeight: 700, letterSpacing: '0.5px',
      background: c.bg, color: c.color, marginLeft: 6,
    }}>{gt}</span>
  );
}

function AblationEventCard({ event }) {
  const [reasoningOpen, setReasoningOpen] = useState(false);

  const sessionShort = (event.session_id || '').slice(0, 8);
  const failureName = (event.failure_name || '').replace(/_/g, ' ');

  if (event.type === 'llm_start') {
    return (
      <div className="event-card">
        <div className="event-card-header">
          <span className="event-badge processing">Processing</span>
          <span className="event-card-failure">{failureName}</span>
          <span className="event-card-session">{sessionShort}</span>
        </div>
        <div className="event-card-detail">
          <div className="event-card-detail-row">
            <span className="event-badge llm-call">{event.call_type || 'llm'}</span>
            <span style={{ fontSize: 12, color: 'var(--text-muted)' }}>
              {event.context_cases_count != null ? event.context_cases_count + ' context cases' : ''}
            </span>
            <div className="ablation-spinner" style={{ width: 12, height: 12 }} />
          </div>
        </div>
      </div>
    );
  }

  if (event.type === 'llm_result') {
    const confirmed = event.confirmed;
    return (
      <div className="event-card">
        <div className="event-card-header">
          <span className={'event-badge ' + (confirmed ? 'confirm' : 'reject')}>
            {confirmed ? 'Confirmed' : 'Rejected'}
          </span>
          <GtBadge gt={event.gt_match} />
          <span className="event-card-failure">{failureName}</span>
          <span className="event-card-session">{sessionShort}</span>
        </div>
        <div className="event-card-detail">
          <div className="event-card-detail-row">
            <span className="event-badge llm-call">{event.call_type || 'llm'}</span>
            <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>
              Confidence: <strong>{((event.confidence || 0) * 100).toFixed(0)}%</strong>
            </span>
            <span className="event-card-latency">{event.latency_ms != null ? event.latency_ms.toFixed(0) + 'ms' : ''}</span>
          </div>
          {event.reasoning && (
            <div className="reasoning-expandable">
              <button className="reasoning-toggle" onClick={() => setReasoningOpen(!reasoningOpen)}>
                <span dangerouslySetInnerHTML={{ __html: reasoningOpen ? '&#9660;' : '&#9654;' }} />
                {' '}Reasoning
              </button>
              {reasoningOpen && (
                <div className="reasoning-content">{event.reasoning}</div>
              )}
            </div>
          )}
        </div>
      </div>
    );
  }

  if (event.type === 'auto_confirm') {
    return (
      <div className="event-card">
        <div className="event-card-header">
          <span className="event-badge auto-confirm">Auto-Confirm</span>
          <GtBadge gt={event.gt_match} />
          <span className="event-card-failure">{failureName}</span>
          <span className="event-card-session">{sessionShort}</span>
        </div>
        <div className="event-card-detail">
          <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>
            Confidence: <strong>{((event.confidence || 0) * 100).toFixed(0)}%</strong>
          </span>
        </div>
      </div>
    );
  }

  if (event.type === 'fp_adjustment') {
    return (
      <div className="event-card">
        <div className="event-card-header">
          <span className="event-badge fp-adjust">FP Adjust</span>
          <span className="event-card-failure">{failureName}</span>
          <span className="event-card-session">{sessionShort}</span>
        </div>
        <div className="event-card-detail">
          <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>
            {(event.original || 0).toFixed(2)} &rarr; {(event.adjusted || 0).toFixed(2)}
          </span>
        </div>
      </div>
    );
  }

  // Fallback for unknown event types
  return (
    <div className="event-card">
      <div className="event-card-header">
        <span className="event-badge llm-call">{event.type || 'unknown'}</span>
        <span className="event-card-failure">{failureName}</span>
        <span className="event-card-session">{sessionShort}</span>
      </div>
    </div>
  );
}


// ================================================================
// AblationProcessingTab Component
// ================================================================
function AblationProcessingTab({ events }) {
  const scrollRef = useRef(null);

  // Auto-scroll to top when new events arrive (newest first)
  useEffect(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollTop = 0;
    }
  }, [events.length]);

  if (!events || events.length === 0) {
    return (
      <div className="ablation-waiting-state">
        <div className="waiting-pulse" />
        <div style={{ fontSize: 14, color: 'var(--text-secondary)' }}>Waiting for LLM events...</div>
      </div>
    );
  }

  // Show newest events first
  const reversed = events.slice().reverse();

  return (
    <div ref={scrollRef} style={{ padding: 16, overflow: 'auto', flex: 1 }}>
      {reversed.map((evt, i) => (
        <AblationEventCard key={events.length - i} event={evt} />
      ))}
    </div>
  );
}


// ================================================================
// AblationResultsTab Component
// ================================================================
function AblationResultsTab({ reports, modesCompleted, comparisonTable, phase }) {
  const completed = modesCompleted || [];
  const reps = reports || {};

  if (completed.length === 0) {
    return (
      <div className="ablation-waiting-state">
        <div className="waiting-pulse" />
        <div style={{ fontSize: 14, color: 'var(--text-secondary)' }}>Waiting for results...</div>
      </div>
    );
  }

  // Find the best F1 across all modes for highlighting
  let bestF1 = -1;
  let bestMode = null;
  completed.forEach(mode => {
    const report = reps[mode];
    if (report && report.macro_f1 > bestF1) {
      bestF1 = report.macro_f1;
      bestMode = mode;
    }
  });

  return (
    <div style={{ padding: 16, overflow: 'auto', flex: 1 }}>
      <table className="results-table">
        <thead>
          <tr>
            <th>Mode</th>
            <th>Precision</th>
            <th>Recall</th>
            <th>F1 (macro)</th>
            <th>F1 (micro)</th>
            <th>Detections</th>
          </tr>
        </thead>
        <tbody>
          {completed.map(mode => {
            const report = reps[mode];
            if (!report) return null;
            const isBest = mode === bestMode;
            return (
              <tr key={mode}>
                <td style={{ fontWeight: 600 }}>{mode}</td>
                <td className="mono">{(report.macro_p || 0).toFixed(3)}</td>
                <td className="mono">{(report.macro_r || 0).toFixed(3)}</td>
                <td className={'mono' + (isBest ? ' best-value' : '')}>{(report.macro_f1 || 0).toFixed(3)}</td>
                <td className="mono">{(report.micro_f1 || 0).toFixed(3)}</td>
                <td className="mono">{report.n_candidates || 0}</td>
              </tr>
            );
          })}

// ================================================================
// AblationPipelineLog Component (Right Column)
// ================================================================
function AblationPipelineLog({ events }) {
  const evts = events || [];

  // Compute counters including GT accuracy
  const counts = useMemo(() => {
    let total = 0, llmCalls = 0, autoConfirms = 0, fpAdjustments = 0;
    let gtTP = 0, gtFP = 0, gtTN = 0, gtFN = 0;
    evts.forEach(evt => {
      total++;
      if (evt.type === 'llm_start' || evt.type === 'llm_result') llmCalls++;
      if (evt.type === 'auto_confirm') autoConfirms++;
      if (evt.type === 'fp_adjustment') fpAdjustments++;
      if (evt.gt_match === 'TP') gtTP++;
      if (evt.gt_match === 'FP') gtFP++;
      if (evt.gt_match === 'TN') gtTN++;
      if (evt.gt_match === 'FN') gtFN++;
    });
    const gtTotal = gtTP + gtFP + gtTN + gtFN;
    const gtAccuracy = gtTotal > 0 ? ((gtTP + gtTN) / gtTotal * 100).toFixed(0) : null;
    return { total, llmCalls, autoConfirms, fpAdjustments, gtTP, gtFP, gtTN, gtFN, gtAccuracy };
  }, [evts]);

  function eventDotClass(evt) {
    if (evt.type === 'llm_start') return 'llm-start';
    if (evt.type === 'llm_result') return evt.confirmed ? 'llm-result-confirmed' : 'llm-result-rejected';
    if (evt.type === 'auto_confirm') return 'auto-confirm';
    if (evt.type === 'fp_adjustment') return 'fp-adjustment';
    return 'llm-start';
  }

  function eventSummary(evt) {
    const name = (evt.failure_name || '').replace(/_/g, ' ');
    const sid = (evt.session_id || '').slice(0, 8);

    if (evt.type === 'llm_start') {
      return React.createElement('span', null,
        React.createElement('strong', null, name),
        ' -- LLM ', evt.call_type || 'call', ' (', sid, ')'
      );
    }
    if (evt.type === 'llm_result') {
      const verdict = evt.confirmed ? 'confirmed' : 'rejected';
      const gt = evt.gt_match;
      return React.createElement('span', null,
        React.createElement('strong', null, name),
        ' -- ', verdict, ' ', ((evt.confidence || 0) * 100).toFixed(0), '%',
        gt ? React.createElement(GtBadge, { gt }) : null,
        ' (', sid, ')'
      );
    }
    if (evt.type === 'auto_confirm') {
      const gt = evt.gt_match;
      return React.createElement('span', null,
        React.createElement('strong', null, name),
        ' -- auto ', ((evt.confidence || 0) * 100).toFixed(0), '%',
        gt ? React.createElement(GtBadge, { gt }) : null,
        ' (', sid, ')'
      );
    }
    if (evt.type === 'fp_adjustment') {
      return React.createElement('span', null,
        React.createElement('strong', null, name),
        ' -- FP ', (evt.original || 0).toFixed(2), ' \u2192 ', (evt.adjusted || 0).toFixed(2), ' (', sid, ')'
      );
    }
    return React.createElement('span', null, evt.type || 'unknown');
  }

  // Show newest first
  const reversed = evts.slice().reverse();

  return (
    <div className="ablation-pipeline">
      <div className="llm-header">
        <div className="section-title">LLM Pipeline</div>
        <div className="llm-stats">
          <div className="llm-stat">
            <div className="llm-stat-dot total" />
            <span className="llm-stat-label">Total</span>
            <span className="llm-stat-value">{counts.total}</span>
          </div>
          <div className="llm-stat">
            <div className="llm-stat-dot confirmed" />
            <span className="llm-stat-label">LLM Calls</span>
            <span className="llm-stat-value">{counts.llmCalls}</span>
          </div>
          <div className="llm-stat">
            <div className="llm-stat-dot autoconfirmed" />
            <span className="llm-stat-label">Auto</span>
            <span className="llm-stat-value">{counts.autoConfirms}</span>
          </div>
          <div className="llm-stat">
            <div className="llm-stat-dot uncertain" />
            <span className="llm-stat-label">FP Adjust</span>
            <span className="llm-stat-value">{counts.fpAdjustments}</span>
          </div>
        </div>
        {counts.gtAccuracy !== null && (
          <div style={{ marginTop: 8, padding: '6px 8px', background: 'var(--bg-surface)', borderRadius: 6 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-secondary)', marginBottom: 4 }}>vs Ground Truth</div>
            <div style={{ display: 'flex', gap: 10, fontSize: 12, flexWrap: 'wrap' }}>
              <span style={{ color: '#4ade80' }}>TP: <strong>{counts.gtTP}</strong></span>
              <span style={{ color: '#60a5fa' }}>TN: <strong>{counts.gtTN}</strong></span>
              <span style={{ color: '#ef4444' }}>FP: <strong>{counts.gtFP}</strong></span>
              <span style={{ color: '#f59e0b' }}>FN: <strong>{counts.gtFN}</strong></span>
              <span style={{ color: 'var(--text-primary)', fontWeight: 600 }}>Acc: {counts.gtAccuracy}%</span>
            </div>
          </div>
        )}
      </div>
      <div className="llm-log">
        {reversed.length === 0 ? (
          <div className="llm-log-empty">No pipeline events yet</div>
        ) : (
          reversed.map((evt, i) => (
            <div key={evts.length - i} className="pipeline-event-item">
              <div className={'pipeline-event-dot ' + eventDotClass(evt)} />
              <div className="pipeline-event-summary">
                {eventSummary(evt)}
              </div>
            </div>
          ))
        )}
      </div>
    </div>
  );
}


// ================================================================
// AblationView Component (Root for ablation mode)
// ================================================================
function AblationView() {
  const [phase, setPhase] = useState('idle');
  const [currentMode, setCurrentMode] = useState(null);
  const [totalSessions, setTotalSessions] = useState(0);
  const [modesCompleted, setModesCompleted] = useState([]);
  const [reports, setReports] = useState({});
  const [recentEvents, setRecentEvents] = useState([]);
  const [comparisonTable, setComparisonTable] = useState('');
  const [sessionsProcessed, setSessionsProcessed] = useState(0);
  const [currentSession, setCurrentSession] = useState('');
  const [currentSessionDetections, setCurrentSessionDetections] = useState([]);
  const [connectionStatus, setConnectionStatus] = useState('connecting');
  const [connectionLabel, setConnectionLabel] = useState('Connecting...');

  const streamEndedRef = useRef(false);

  // WebSocket connection for ablation mode
  useEffect(() => {
    let ws = null;
    let reconnectTimer = null;

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(protocol + '//' + location.host + '/ws');

      ws.onopen = () => {
        setConnectionStatus('connected');
        setConnectionLabel('Connected');
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
      };

      ws.onclose = () => {
        if (streamEndedRef.current) {
          setConnectionStatus('connected');
          setConnectionLabel('Ablation complete');
          return;
        }
        setConnectionStatus('disconnected');
        setConnectionLabel('Disconnected');
        reconnectTimer = setTimeout(connect, 3000);
      };

      ws.onerror = () => {
        setConnectionStatus('disconnected');
        setConnectionLabel('Error');
      };

      ws.onmessage = (evt) => {
        let data;
        try {
          data = JSON.parse(evt.data);
        } catch (e) {
          return;
        }

        if (data.type === 'ablation_waiting') {
          setPhase(data.phase || 'idle');
          setConnectionStatus('waiting');
          setConnectionLabel('Waiting for ablation...');
          return;
        }

        if (data.type === 'ablation_update') {
          setPhase(data.phase || 'running');
          setCurrentMode(data.current_mode || null);
          setTotalSessions(data.total_sessions || 0);
          setModesCompleted(data.modes_completed || []);
          setReports(data.reports || {});
          if (data.sessions_processed !== undefined) {
            setSessionsProcessed(data.sessions_processed);
          }
          if (data.current_session !== undefined) {
            setCurrentSession(data.current_session);
          }
          if (data.current_session_detections !== undefined) {
            setCurrentSessionDetections(data.current_session_detections);
          }
          if (data.recent_events) {
            setRecentEvents(data.recent_events);
          }
          setConnectionStatus('connected');
          setConnectionLabel(data.phase === 'setup' ? 'Setting up...' : 'Running');
          return;
        }

        if (data.type === 'ablation_complete') {
          streamEndedRef.current = true;
          setPhase('complete');
          setModesCompleted(data.modes_completed || []);
          setReports(data.reports || {});
          setComparisonTable(data.comparison_table || '');
          if (data.recent_events) {
            setRecentEvents(data.recent_events);
          }
          setConnectionStatus('connected');
          setConnectionLabel('Ablation complete');
          return;
        }

        // Also handle generic stream_end / waiting for compatibility
        if (data.type === 'stream_end') {
          streamEndedRef.current = true;
          setConnectionStatus('connected');
          setConnectionLabel('Ablation complete');
          return;
        }

        if (data.type === 'waiting') {
          if (!streamEndedRef.current) {
            setConnectionStatus('waiting');
            setConnectionLabel('Waiting...');
          }
          return;
        }
      };
    }

    connect();

    return () => {
      if (ws) ws.close();
      if (reconnectTimer) clearTimeout(reconnectTimer);
    };
  }, []);

  // Also fetch initial status on mount
  useEffect(() => {
    fetch('/api/ablation/status')
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (!data) return;
        if (data.phase) setPhase(data.phase);
        if (data.current_mode) setCurrentMode(data.current_mode);
        if (data.total_sessions) setTotalSessions(data.total_sessions);
        if (data.modes_completed) setModesCompleted(data.modes_completed);
        if (data.reports) setReports(data.reports);
        if (data.comparison_table) setComparisonTable(data.comparison_table);
      })
      .catch(() => {});

    fetch('/api/ablation/events?last=50')
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (data && Array.isArray(data)) {
          setRecentEvents(data);
        }
      })
      .catch(() => {});
  }, []);

  const connectionDotClass = connectionStatus === 'connected' ? 'connected'
    : connectionStatus === 'waiting' ? 'waiting'
    : 'disconnected';

  return (
    <div id="app">
      {/* Top Bar */}
      <div id="top-bar">
        <div className="logo">agent<span>diag</span></div>
        <div id="session-indicator">
          <span className="session-project" style={{ color: 'var(--phase-gathering)' }}>Ablation Study</span>
          {currentMode && phase === 'running' && (
            <span className="session-id">mode: {currentMode}</span>
          )}
        </div>
        <div id="connection-status">
          <div id="connection-dot" className={connectionDotClass} />
          <span>{connectionLabel}</span>
        </div>
      </div>

      {/* Complete banner */}
      {phase === 'complete' && (
        <div className="ablation-complete-banner">
          Ablation complete -- {modesCompleted.length} modes evaluated across {totalSessions} sessions
        </div>
      )}

      {/* Main 3-column ablation layout */}
      <div className="ablation-layout">
        {/* LEFT: Progress */}
        <AblationProgress
          phase={phase}
          currentMode={currentMode}
          modesCompleted={modesCompleted}
          totalSessions={totalSessions}
          reports={reports}
          sessionsProcessed={sessionsProcessed}
          currentSession={currentSession}
          currentSessionDetections={currentSessionDetections}
        />

        {/* CENTER: Processing/Results tabs */}
        <AblationCenterPanel
          events={recentEvents}
          reports={reports}
          modesCompleted={modesCompleted}
          comparisonTable={comparisonTable}
          phase={phase}
        />

        {/* RIGHT: Pipeline log */}
        <AblationPipelineLog events={recentEvents} />
      </div>
    </div>
  );
}

function NormalDashboard() {
  const [viewMode, setViewMode] = useState('simple');  // 'simple' or 'technical'

  const [connectionStatus, setConnectionStatus] = useState('connecting');
  const [connectionLabel, setConnectionLabel] = useState('Connecting...');
  const [streamEnded, setStreamEnded] = useState(false);
  const [activeTab, setActiveTab] = useState('signals');
  const [decisionTraceData, setDecisionTraceData] = useState(null);
  const [decisionTraceLoaded, setDecisionTraceLoaded] = useState(false);
  const [sessionProfile, setSessionProfile] = useState(null);
  const [modalDetector, setModalDetector] = useState(null);
  const [modalVisible, setModalVisible] = useState(false);
  const [highlightRange, setHighlightRange] = useState(null);

  // Cognitive Load state
  const [ipStageMap, setIpStageMap] = useState(null);
  const [cognitiveSelectedStage, setCognitiveSelectedStage] = useState(null);
  const [cognitiveMemoryDetail, setCognitiveMemoryDetail] = useState(null);
  const [cognitiveDecisionsDetail, setCognitiveDecisionsDetail] = useState(null);

  const timelineBlocksRef = useRef(null);
  const streamEndedRef = useRef(false);

  // WebSocket connection
  useEffect(() => {
    let ws = null;
    let reconnectTimer = null;

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(protocol + '//' + location.host + '/ws');

      ws.onopen = () => {
        setConnectionStatus('connected');
        setConnectionLabel('Connected');
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
      };

      ws.onclose = () => {
        // Don't reconnect if stream already ended — preserve final state
        if (streamEndedRef.current) {
          setConnectionStatus('connected');
          setConnectionLabel('Session complete');
          return;
        }
        setConnectionStatus('disconnected');
        setConnectionLabel('Disconnected');
        reconnectTimer = setTimeout(connect, 3000);
      };

      ws.onerror = () => {
        setConnectionStatus('disconnected');
        setConnectionLabel('Error');
      };

      ws.onmessage = (evt) => {
        let data;
        try {
          data = JSON.parse(evt.data);
        } catch (e) {
          return;
        }

        if (data.type === 'waiting') {
          // Don't wipe state after stream ended — keep final snapshot
          if (!streamEndedRef.current) {
            setState(null);
            setConnectionStatus('waiting');
            setConnectionLabel('Waiting...');
          }
          return;
        }

        if (data.type === 'stream_end') {
          streamEndedRef.current = true;
          setStreamEnded(true);
          setConnectionStatus('connected');
          setConnectionLabel('Session complete');
          return;
        }

        if (data.type === 'state_update') {
          setState(data);
        }
      };
    }

    connect();

    return () => {
      if (ws) ws.close();
      if (reconnectTimer) clearTimeout(reconnectTimer);
    };
  }, []);

  // Lazy-load decision trace when tab is selected
  useEffect(() => {
    if (activeTab === 'decision-trace' && !decisionTraceLoaded) {
      setDecisionTraceLoaded(true);
      fetch('/api/decision-trace')
        .then(r => {
          if (!r.ok) throw new Error('Not found');
          return r.json();
        })
        .then(data => {
          setDecisionTraceData(data);
          if (data.current_profile) {
            setSessionProfile(data.current_profile);
          }
        })
        .catch(() => {
          setDecisionTraceData(null);
        });
    }
  }, [activeTab, decisionTraceLoaded]);

  // Fetch IP stage map once on mount — normalize to { caftCode: stageName }
  useEffect(() => {
    fetch('/api/cognitive/ip-stage-map')
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (!data) return;
        // API may return { "4.4": { ip_stage: "action" } } or { "4.4": "action" }
        const normalized = {};
        Object.keys(data).forEach(code => {
          const val = data[code];
          normalized[code] = typeof val === 'string' ? val : (val && val.ip_stage) || null;
        });
        setIpStageMap(normalized);
      })
      .catch(() => {});
  }, []);

  // Tab switch handler
  const handleTabChange = useCallback((tab) => {
    setActiveTab(tab);
  }, []);

  // Block click in timeline: switch to diagnoses and highlight
  const handleTimelineBlockClick = useCallback((startStep, endStep) => {
    setActiveTab('diagnoses');
    setHighlightRange({ start: startStep, end: endStep });
  }, []);

  // Step link click in diagnosis: switch to timeline and highlight block
  const handleStepClick = useCallback((step) => {
    setActiveTab('timeline');
    // After switching to timeline, find and highlight the block containing this step
    // We use a small delay to ensure the DOM has updated
    setTimeout(() => {
      const blocks = document.querySelectorAll('.behavior-block');
      for (let i = 0; i < blocks.length; i++) {
        const start = parseInt(blocks[i].getAttribute('data-start'), 10);
        const end = parseInt(blocks[i].getAttribute('data-end'), 10);
        if (step >= start && step <= end) {
          blocks[i].scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
          blocks[i].classList.add('selected');

          return;
        }
      }
    }, 50);
  }, []);

  // Detector detail modal
  const handleDetectorClick = useCallback((name) => {
    setModalDetector(name);
    setModalVisible(true);
  }, []);

  const handleModalClose = useCallback(() => {
    setModalVisible(false);
    setModalDetector(null);
  }, []);

  // IP stage tag click: navigate to Cognitive tab with that stage expanded
  const handleIPStageClick = useCallback((stage) => {
    setActiveTab('cognitive');
    setCognitiveSelectedStage(stage);
  }, []);

  // Cognitive stage click: toggle detail panel
  const handleCognitiveStageClick = useCallback((stage) => {
    setCognitiveSelectedStage(prev => prev === stage ? null : stage);
  }, []);

  // Cognitive lazy-fetch handlers
  const handleFetchCognitiveMemory = useCallback(() => {
    fetch('/api/cognitive/memory')
      .then(r => r.ok ? r.json() : null)
      .then(data => setCognitiveMemoryDetail(data))
      .catch(() => {});
  }, []);

  const handleFetchCognitiveDecisions = useCallback(() => {
    fetch('/api/cognitive/decisions')
      .then(r => r.ok ? r.json() : null)
      .then(data => setCognitiveDecisionsDetail(data))
      .catch(() => {});
  }, []);

  const diagnosesCount = state ? (state.diagnoses || []).length : 0;

  const connectionDotClass = connectionStatus === 'connected' ? 'connected'
    : connectionStatus === 'waiting' ? 'waiting'
    : 'disconnected';

  return (
    <div id="app">
      {/* Top Bar */}
      <div id="top-bar">
        <div className="logo">agent<span>diag</span></div>
        <div id="session-indicator">
          {state?.session_context?.session_id && (
            <>
              {state.session_context.project_dir && (
                <span className="session-project">{state.session_context.project_dir}</span>
              )}
              <span className="session-id">{state.session_context.session_id.slice(0, 8)}</span>
            </>
          )}
        </div>
        {/* View toggle */}
        <div className="view-toggle">
          <button className={'view-toggle-btn' + (viewMode === 'simple' ? ' active' : '')}
                  onClick={() => setViewMode('simple')}>Simple</button>
          <button className={'view-toggle-btn' + (viewMode === 'technical' ? ' active' : '')}
                  onClick={() => setViewMode('technical')}>Technical</button>
        </div>

        <div id="connection-status">
          <div id="connection-dot" className={connectionDotClass} />
          <span>{connectionLabel}</span>
        </div>
      </div>

      {/* Session complete banner */}
      <div className={`session-complete-banner${streamEnded ? ' visible' : ''}`}>
        {state?.session_context?.user_goal ? (
          <>
            Session complete
            {state.total_events > 0 && ` \u2014 ${state.total_events} events`}
            {state.diagnoses?.length > 0 && ` \u2014 ${state.diagnoses.length} diagnosis${state.diagnoses.length !== 1 ? 'es' : ''}`}
          </>
        ) : (
          'Session complete \u2014 final snapshot displayed'
        )}
      </div>

      {/* Simple view (default) */}
      {viewMode === 'simple' && (
        <div id="main" style={{ display: 'flex', flex: 1, minHeight: 0 }}>
          <SimpleView state={state} />
        </div>
      )}

      {/* Technical view (3-column layout) */}
      <div id="main" style={{ display: viewMode === 'technical' ? '' : 'none' }}>
        {/* LEFT: Session Health */}
        {state ? (
          <SessionHealth state={state} sessionProfile={sessionProfile} cognitiveState={state?.cognitive_state}
            workingMemory={state?.working_memory} infoTheoretic={state?.info_theoretic} />
        ) : (
          <div id="left-col">
            <div className="panel-section">
              <div className="section-title">Current Phase</div>
              <div className="current-phase-text" style={{ color: phaseColor('idle') }}>idle</div>
              <div className="phase-progress-bar">
                <div className="phase-progress-fill" style={{ width: '0%' }} />
              </div>
            </div>
            <div className="panel-section">
              <div className="section-title">Session Health</div>
              <div className="health-badge-el healthy">
                <div className="health-dot" />
                <span>healthy</span>
              </div>
              <div style={{ marginTop: 12 }}>
                <div className="stat-row">
                  <span className="stat-label">Completion Rate</span>
                  <span className="stat-value">0%</span>
                </div>
                <div className="completion-bar-container">
                  <div className="completion-bar-bg">
                    <div className="completion-bar-fill-el" style={{ width: '0%', background: PHASE_COLORS.executing }} />
                  </div>
                </div>
              </div>
            </div>
            <div className="panel-section">
              <div className="section-title">Metrics</div>
              <div className="stat-row">
                <span className="stat-label">Failure Density</span>
                <span className="stat-value">0 / 100 events</span>
              </div>
              <div className="stat-row">
                <span className="stat-label">Total Events</span>
                <span className="stat-value">0</span>
              </div>
              <div className="stat-row">
                <span className="stat-label">Total Errors</span>
                <span className="stat-value">0</span>
              </div>
              <div className="stat-row">
                <span className="stat-label">Events / min</span>
                <span className="stat-value">0</span>
              </div>
              <div className="stat-row">
                <span className="stat-label">Phase Regressions</span>
                <span className="stat-value">0</span>
              </div>
            </div>
            <div className="panel-section">
              <div className="section-title">Phase Balance</div>
              <div className="phase-balance" />
              <div className="phase-breakdown" />
            </div>
          </div>
        )}

        {/* CENTER: IP Pipeline + Tabs */}
        <div id="center-col" style={{ position: 'relative', display: 'flex', flexDirection: 'column' }}>
          {/* Waiting overlay */}
          <div className={`waiting-overlay${state ? ' hidden' : ''}`}>
            <div className="waiting-pulse" />
            <div className="waiting-text">Waiting for events...</div>
          </div>

          {/* IP Pipeline Strip (always visible when cognitive enabled) */}
          {state && state.cognitive_state && (
            <IPPipelineStrip
              cognitiveState={state.cognitive_state}
              infoTheoretic={state.info_theoretic}
              anomalies={state.anomalies}
              selectedStage={cognitiveSelectedStage}
              onStageClick={handleCognitiveStageClick}
              flowRates={state.flow_rates}
            />
          )}

          <div className="tab-bar">
            <button
              className={`tab-btn${activeTab === 'signals' ? ' active' : ''}`}
              onClick={() => handleTabChange('signals')}
            >
              Signals
            </button>
            <button
              className={`tab-btn${activeTab === 'timeline' ? ' active' : ''}`}
              onClick={() => handleTabChange('timeline')}
            >
              Timeline
            </button>
            <button
              className={`tab-btn${activeTab === 'memory-ops' ? ' active' : ''}`}
              onClick={() => handleTabChange('memory-ops')}
            >
              Memory Ops
            </button>
            <button
              className={`tab-btn${activeTab === 'diagnoses' ? ' active' : ''}`}
              onClick={() => handleTabChange('diagnoses')}
            >
              Diagnoses<span className="tab-count">{diagnosesCount}</span>
            </button>
            <button
              className={`tab-btn${activeTab === 'decision-trace' ? ' active' : ''}`}
              onClick={() => handleTabChange('decision-trace')}
            >
              Decision Trace
            </button>
            <button
              className={`tab-btn${activeTab === 'cognitive' ? ' active' : ''}`}
              onClick={() => handleTabChange('cognitive')}
            >
              Cognitive
            </button>
          </div>

          {/* Signals tab (NEW default) */}
          <div className={`tab-panel${activeTab === 'signals' ? ' active' : ''}`}>
            <InformationSignalsPanel
              infoTheoretic={state ? state.info_theoretic : null}
              anomalies={state ? state.anomalies : null}
              containerWidth={800}
            />
          </div>

          {/* Timeline tab */}
          <div className={`tab-panel${activeTab === 'timeline' ? ' active' : ''}`}>
            {state ? (
              <BehaviorTimeline
                state={state}
                onBlockClick={handleTimelineBlockClick}
              />
            ) : (
              <div className="timeline-panel">
                <div className="timeline-scroll">
                  <div className="timeline-empty">No events yet</div>
                </div>
              </div>
            )}
          </div>

          {/* Memory Ops tab (NEW) */}
          <div className={`tab-panel${activeTab === 'memory-ops' ? ' active' : ''}`}>
            <MemoryOpsTimeline infoTheoretic={state ? state.info_theoretic : null} />
          </div>

          {/* Diagnoses tab */}
          <div className={`tab-panel${activeTab === 'diagnoses' ? ' active' : ''}`}>
            {state ? (
              <DiagnosisPanel
                state={state}
                onStepClick={handleStepClick}
                highlightRange={highlightRange}
                ipStageMap={ipStageMap}
                onIPStageClick={handleIPStageClick}
              />
            ) : (
              <div className="diagnoses-panel">
                <div className="diagnoses-empty">
                  <div>
                    <span className="healthy-icon">&#10003;</span>
                    Session healthy -- no issues detected
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* Decision Trace tab */}
          <div className={`tab-panel${activeTab === 'decision-trace' ? ' active' : ''}`}>
            <DecisionTrace traceData={decisionTraceData} />
          </div>

          {/* Cognitive tab (legacy, kept for backward compat) */}
          <div className={`tab-panel${activeTab === 'cognitive' ? ' active' : ''}`}>
            <CognitiveLoadMonitor
              cognitiveState={state ? state.cognitive_state : null}
              selectedStage={cognitiveSelectedStage}
              onStageClick={handleCognitiveStageClick}
              memoryDetail={cognitiveMemoryDetail}
              decisionsDetail={cognitiveDecisionsDetail}
              onFetchMemory={handleFetchCognitiveMemory}
              onFetchDecisions={handleFetchCognitiveDecisions}
            />
          </div>
        </div>

        {/* RIGHT: Annotations (was LLM Decisions) */}
        {state ? (
          <CAFTAnnotationsPanel state={state} onStepClick={handleStepClick} ipStageMap={ipStageMap} />
        ) : (
          <div id="right-col" className="annotations-panel">
            <div className="annotations-header">
              <div className="section-title">Annotations</div>
              <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 2 }}>0 detections</div>
            </div>
            <div className="annotations-list">
              <div style={{ color: 'var(--text-muted)', fontSize: 12, textAlign: 'center', padding: 24 }}>
                Waiting for events...
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Detector Detail Modal */}
      <DetectorDetailModal
        detectorName={modalDetector}
        visible={modalVisible}
        onClose={handleModalClose}
      />
    </div>
  );
}

// ---- Mount ----
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
